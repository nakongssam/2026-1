<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전공체험 신청 현황판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#26231c; --body:#4a463d; --muted:#9b958a; --line:#efece4; --line2:#e7e3d8;
    --yellow:#ffd84d; --yellow-d:#f5c518; --yellow-soft:#fff7d6; --band:#fff2bf;
    --ok:#2f8f6a; --ok-soft:#e9f6ef; --danger:#dd5a4e;
    --surface:#fff; --page:#fffdf7; --track:#f0ede4; --rowhover:#fcfaf2;
    --shadow:0 2px 4px rgba(60,52,30,.04), 0 8px 22px rgba(80,68,30,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --ink:#f3efe6; --body:#d8d3c8; --muted:#9a948a; --line:#322f28; --line2:#3a372f;
      --yellow:#ffd84d; --yellow-d:#ffe06b; --yellow-soft:#3a3320; --band:#2a2718;
      --ok:#5fcfa3; --ok-soft:#1e3a30; --danger:#ff8a7d;
      --surface:#26241e; --page:#1b1a15; --track:#34312a; --rowhover:#2d2a22;
      --shadow:0 2px 4px rgba(0,0,0,.2), 0 8px 22px rgba(0,0,0,.3);
    }
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Pretendard","Apple SD Gothic Neo",system-ui,sans-serif; color:var(--body);
        font-size:16px; line-height:1.6; background:var(--page); -webkit-font-smoothing:antialiased; }
  .display{ font-family:"Gmarket Sans","Pretendard",sans-serif; }
  .wrap{ max-width:1080px; margin:0 auto; padding:24px 18px 70px; }
  h1{ font-size:1.5rem; color:var(--ink); letter-spacing:-.01em; margin:6px 0 4px; cursor:default; user-select:none; }
  .sub{ color:var(--muted); font-size:.9rem; margin-bottom:18px; }
  .login{ max-width:380px; margin:70px auto; background:var(--surface); border:1px solid var(--line2);
          border-radius:18px; padding:28px 24px; box-shadow:var(--shadow); }
  .login h2{ margin:0 0 4px; font-size:1.2rem; color:var(--ink); }
  .login .hint{ color:var(--muted); font-size:.86rem; margin:0 0 14px; }
  label{ display:block; font-size:.82rem; font-weight:600; margin:12px 0 6px; color:var(--body); }
  input,select{ width:100%; padding:12px 13px; border:1.5px solid var(--line2); border-radius:11px; font-size:1rem;
                background:var(--page); color:var(--ink); transition:.15s; }
  input:focus,select:focus{ outline:none; border-color:var(--yellow-d); background:var(--surface); box-shadow:0 0 0 3px rgba(245,197,24,.25); }
  button{ border:none; border-radius:11px; background:var(--yellow); color:#3a3320; font-weight:700; cursor:pointer; transition:.15s; }
  button:hover{ background:var(--yellow-d); } button:active{ transform:translateY(1px); }
  .login button{ width:100%; margin-top:18px; padding:13px; font-size:1rem; box-shadow:0 4px 14px rgba(245,197,24,.35); }
  .bar{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .bar .right{ display:flex; gap:8px; flex-wrap:wrap; }
  .bar button{ padding:9px 14px; font-size:.86rem; }
  .ghost{ background:var(--surface); color:var(--body); border:1.5px solid var(--line2); font-weight:600; }
  .ghost:hover{ background:var(--track); }
  .summary{ background:var(--surface); border:1px solid var(--line2); border-radius:14px; padding:15px 18px;
            margin-bottom:16px; font-size:1rem; color:var(--body); box-shadow:var(--shadow); }
  .summary b{ color:var(--ink); font-weight:700; }
  .tabs{ display:inline-flex; gap:4px; margin-bottom:16px; background:var(--track); padding:5px; border-radius:13px; flex-wrap:wrap; }
  .tab{ padding:9px 16px; border-radius:9px; background:transparent; color:var(--muted); cursor:pointer; font-weight:700; font-size:.9rem; transition:.15s; }
  .tab.active{ background:var(--surface); color:var(--ink); box-shadow:var(--shadow); }
  .toolbar{ display:none; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
  .toolbar.show{ display:flex; }
  .toolbar .field{ display:flex; align-items:center; gap:7px; }
  .toolbar label{ margin:0; font-size:.85rem; color:var(--body); font-weight:600; white-space:nowrap; }
  .toolbar select{ width:auto; min-width:150px; padding:9px 12px; }
  .toolbar .spacer{ flex:1; }

  /* 카드 (테이블 감싸기) */
  .panel{ background:var(--surface); border:1px solid var(--line2); border-radius:16px; box-shadow:var(--shadow); overflow:hidden; margin-bottom:16px; }
  .panel .ph{ display:flex; justify-content:space-between; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--line); }
  .panel .ph .nm{ font-weight:700; color:var(--ink); font-size:1.04rem; display:flex; align-items:center; gap:8px; }
  .panel .ph .cnt{ font-size:.9rem; font-weight:700; color:var(--body); white-space:nowrap; }
  .dot{ width:11px; height:11px; border-radius:50%; flex:none; }

  /* 테이블 */
  table{ width:100%; border-collapse:collapse; font-size:.93rem; }
  thead th{ text-align:left; padding:11px 14px; font-size:.8rem; font-weight:600; color:var(--muted);
            background:var(--track); position:sticky; top:0; }
  tbody td{ padding:11px 14px; border-top:1px solid var(--line); color:var(--body); vertical-align:middle; }
  tbody tr:hover{ background:var(--rowhover); }
  td.nm{ font-weight:500; color:var(--ink); }
  td.right{ text-align:right; }
  .cap{ color:var(--muted); font-variant-numeric:tabular-nums; }
  .cap b{ color:var(--ink); font-weight:700; }
  .mini{ height:7px; width:120px; max-width:34vw; background:var(--track); border-radius:5px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:8px; }
  .mini > i{ display:block; height:100%; border-radius:5px; }
  .tag-full{ color:var(--danger); font-weight:700; font-size:.8rem; }
  .dpill{ display:inline-block; font-size:.76rem; font-weight:700; color:#fff; padding:2px 10px; border-radius:999px; }
  .npill{ display:inline-block; font-size:.76rem; font-weight:600; color:var(--muted); background:var(--track); padding:2px 10px; border-radius:999px; }
  .rowlink{ cursor:pointer; }
  .rowlink:hover td{ background:var(--rowhover); }
  .chev{ color:var(--muted); }
  .rm{ color:var(--danger); cursor:pointer; font-size:.82rem; background:none; border:none; padding:0; font-weight:700; }
  .empty{ color:var(--muted); font-size:.88rem; padding:18px; text-align:center; }
  .subhead{ padding:10px 18px; background:var(--yellow-soft); font-size:.85rem; font-weight:700; color:var(--ink);
            display:flex; align-items:center; gap:8px; border-top:1px solid var(--line); }
  .subhead .c{ color:var(--muted); font-weight:600; }

  /* 프로그램 소개 탭 */
  .introlist{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px; }
  .icard{ background:var(--surface); border:1px solid var(--line2); border-left:4px solid var(--dc,var(--yellow-d));
          border-radius:14px; padding:14px 16px; box-shadow:var(--shadow); }
  .icard .t{ font-weight:700; color:var(--ink); margin-bottom:5px; }
  .icard .d{ font-size:.88rem; color:var(--body); }

  #status{ font-size:.85rem; color:#b48a00; margin-bottom:10px; min-height:1em; font-weight:600; }
  #status.err{ color:var(--danger); } #status.ok{ color:var(--ok); }
  .modal{ position:fixed; inset:0; background:rgba(20,18,10,.55); display:none; align-items:center; justify-content:center; z-index:50; backdrop-filter:blur(2px); }
  .modal.show{ display:flex; }
  .modal .box{ background:var(--surface); border-radius:18px; padding:24px; width:350px; max-width:92vw; box-shadow:0 20px 50px rgba(0,0,0,.3); }
  .modal h3{ margin:0 0 14px; font-size:1.15rem; color:var(--ink); }
  .modal button.full{ width:100%; padding:13px; margin-top:18px; font-size:1rem; }
  .modal .x{ background:var(--surface); color:var(--muted); border:1.5px solid var(--line2); margin-top:8px; }
  .modal .mmsg{ font-size:.85rem; margin-top:10px; min-height:1em; font-weight:600; }
  @media (max-width:520px){ .introlist{ grid-template-columns:1fr; } .toolbar select{ min-width:0; flex:1; }
    thead th:nth-child(2), tbody td:nth-child(2){ display:none; } /* 좁은 화면에선 진행바 숨김 */ }
</style>
</head>
<body>
<div class="wrap">
  <div class="login" id="login">
    <h2>담임 로그인</h2>
    <p class="hint">담임 계정으로 로그인하세요.</p>
    <label>이메일</label><input id="email" type="email" placeholder="교사 계정 이메일" />
    <label>비밀번호</label><input id="pw" type="password" />
    <button id="loginBtn">로그인</button>
    <div id="loginErr" style="color:#dd5a4e;font-size:.85rem;margin-top:8px;font-weight:600;"></div>
  </div>

  <div id="dash" style="display:none;">
    <div class="bar">
      <div>
        <h1 class="display" id="title">전공체험 신청 현황판</h1>
        <div class="sub">선문대 전공체험 · 2026. 7. 14.(화) · 실시간 업데이트</div>
      </div>
      <div class="right">
        <button id="addStuBtn">＋ 학생 추가</button>
        <button class="ghost" id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <div class="bar" id="advBtns" style="display:none; justify-content:flex-start;">
      <div class="right">
        <button class="ghost" id="seedBtn">학과 초기 세팅</button>
        <button class="ghost" id="importBtn">학생 명단 가져오기</button>
        <button class="ghost" id="recalcBtn">정원 재계산</button>
        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" />
      </div>
    </div>

    <div id="status"></div>
    <div class="summary" id="summary">불러오는 중…</div>

    <div class="tabs">
      <div class="tab active" id="tabSummary">현황</div>
      <div class="tab" id="tabDept">학과별 명단</div>
      <div class="tab" id="tabClass">반별 명단</div>
      <div class="tab" id="tabIntro">프로그램 소개</div>
    </div>

    <div class="toolbar" id="deptTools">
      <div class="spacer"></div>
      <button class="ghost" id="csvDeptBtn">학과별 CSV</button>
    </div>
    <div class="toolbar" id="classTools">
      <div class="field"><label for="classPick">반 선택</label><select id="classPick"></select></div>
      <div class="field"><label for="classDeptFilter">학과 필터</label><select id="classDeptFilter"></select></div>
      <div class="spacer"></div>
      <button class="ghost" id="csvClassBtn">반별 CSV</button>
    </div>

    <div id="summaryView"></div>
    <div id="deptView" style="display:none;"></div>
    <div id="classView" style="display:none;"></div>
    <div id="introView" style="display:none;"></div>
  </div>
</div>

<div class="modal" id="addModal">
  <div class="box">
    <h3>학생 추가 (전입생)</h3>
    <label>학번 (5자리)</label><input id="addSid" inputmode="numeric" maxlength="5" placeholder="예) 10101" />
    <label>이름</label><input id="addName" placeholder="예) 홍길동" />
    <label>생년월일 6자리</label><input id="addBirth" inputmode="numeric" maxlength="6" placeholder="예) 100101" />
    <div class="mmsg" id="addMsg"></div>
    <button class="full" id="addConfirm">추가하기</button>
    <button class="full x" id="addCancel">닫기</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut,
         setPersistence, browserLocalPersistence }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, doc, query, orderBy, onSnapshot,
  getDoc, getDocs, setDoc, deleteDoc, writeBatch, runTransaction
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBHlhwEiE8PyX4Voy1xsS3PZkSMIZ1nos0",
  authDomain: "project-8873314123491726167.firebaseapp.com",
  projectId: "project-8873314123491726167",
  storageBucket: "project-8873314123491726167.firebasestorage.app",
  messagingSenderId: "651427691407",
  appId: "1:651427691407:web:2c7530ff9b8035428469fa",
  measurementId: "G-FTNE1QRPN7",
};

const SEED = [
  { id:"d01", ord:1,  name:"사학과",                 detail:"임진왜란과 비밀병기: 거북선 키트 만들기" },
  { id:"d02", ord:2,  name:"경찰행정법학과",         detail:"경찰공무원(법집행공무원) 되기와 경찰 장구 사용의 다양한 체험" },
  { id:"d03", ord:3,  name:"사회복지학과",           detail:"우리마을 지도 만들기, 마을 한 바퀴 부루마블" },
  { id:"d04", ord:4,  name:"미디어커뮤니케이션학부", detail:"미디어커뮤니케이션 전공 탐색: 광고, PR, 영상 콘텐츠와 AI" },
  { id:"d05", ord:5,  name:"경영학과",               detail:"주식모의투자를 통한 경영학의 이해" },
  { id:"d06", ord:6,  name:"항공서비스학과",         detail:'오늘은 "나도 Cabin Crew": 객실 승무원 실전 체험' },
  { id:"d07", ord:7,  name:"제약생명공학과",         detail:"DNA 추출, 크로마토그래피" },
  { id:"d08", ord:8,  name:"간호학과",               detail:"1일 나이팅게일 체험" },
  { id:"d09", ord:9,  name:"응급구조학과",           detail:"119 구급대 및 병원 응급실 응급구조사 직무 체험" },
  { id:"d10", ord:10, name:"지능로봇공학과",         detail:"미래를 움직이는 로봇: AI + 자율 시스템 체험" },
  { id:"d11", ord:11, name:"스포츠과학과",           detail:"스포츠과학 운동능력 테스트: 체육 계열 실기와 스포츠 과학 실험실 체험" },
  { id:"d12", ord:12, name:"영화영상학과",           detail:"360도를 찍어보자 _ 인스타 360을 활용한 촬영 실습" },
  { id:"d13", ord:13, name:"외국어학부(영어)",       detail:"영어 전공 이해와 영어의사소통능력 향상 튜터링 프로그램" },
];
const DCOLORS = ["#e8643c","#3b7dd8","#2fa37a","#b65fd1","#cf9b00","#d8527c","#1fa3a0",
                 "#6a78e0","#d8453f","#5aa02c","#c2792e","#8a64d6","#4a8db5"];
const colorOf = (ord)=>DCOLORS[((ord||1)-1) % DCOLORS.length];

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
setPersistence(auth, browserLocalPersistence).catch(()=>{});
const $ = (id)=>document.getElementById(id);

let depts=[], students=[], seats=[], unsub=[], tab="summary";
let classPick="all", classFilter="all";
const ordOf={};

async function sha256Hex(str){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }
const normBirth=(s)=>String(s).replace(/\D/g,"").padStart(6,"0").slice(-6);
const vhashOf=(sid,birth)=>sha256Hex(`${String(sid).trim()}|${normBirth(birth)}`);
const parseSid=(sid)=>{ const s=String(sid); return { classNo:+s.slice(1,3), studentNo:+s.slice(3,5) }; };
const esc=(s)=>String(s).replace(/[&<>]/g,(c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
function setStatus(t,cls=""){ const e=$("status"); e.textContent=t; e.className=cls; }

$("loginBtn").addEventListener("click", async ()=>{
  $("loginErr").textContent="";
  try { await signInWithEmailAndPassword(auth, $("email").value.trim(), $("pw").value); }
  catch(e){ $("loginErr").textContent="로그인 실패: 이메일/비밀번호를 확인해 주세요."; }
});
$("logoutBtn").addEventListener("click", ()=>signOut(auth));

onAuthStateChanged(auth,(user)=>{
  if(user){ $("login").style.display="none"; $("dash").style.display="block"; startListening(); }
  else { unsub.forEach(fn=>fn()); unsub=[]; $("login").style.display="block"; $("dash").style.display="none"; }
});

function startListening(){
  if(unsub.length) return;
  unsub.push(onSnapshot(query(collection(db,"departments"),orderBy("ord")), s=>{ depts=s.docs.map(d=>({id:d.id,...d.data()})); depts.forEach(d=>ordOf[d.id]=d.ord); buildPickers(); render(); }));
  unsub.push(onSnapshot(collection(db,"students"), s=>{ students=s.docs.map(d=>({vhash:d.id,...d.data()})); buildPickers(); render(); }, e=>{console.error(e); setStatus("학생 명단을 불러오지 못했습니다.","err");}));
  unsub.push(onSnapshot(collection(db,"seats"), s=>{ seats=s.docs.map(d=>({vhash:d.id,...d.data()})); render(); }, e=>console.error(e)));
}

let clickCount=0, clickTimer=null;
$("title").addEventListener("click", ()=>{
  clickCount++; clearTimeout(clickTimer); clickTimer=setTimeout(()=>clickCount=0, 1200);
  if(clickCount>=5){ clickCount=0; const a=$("advBtns"); a.style.display = a.style.display==="none"?"flex":"none"; }
});

["Summary","Dept","Class","Intro"].forEach(k=>{
  $("tab"+k).addEventListener("click", ()=>switchTab(k.toLowerCase()));
});
function switchTab(t){ tab=t;
  ["summary","dept","class","intro"].forEach(k=>{
    $("tab"+k[0].toUpperCase()+k.slice(1)).classList.toggle("active", k===t);
    $(k+"View").style.display = (k===t)?"block":"none";
  });
  $("deptTools").classList.toggle("show", t==="dept");
  $("classTools").classList.toggle("show", t==="class");
}

function buildPickers(){
  const cls=[...new Set(students.map(st=>parseSid(st.studentId).classNo))].sort((a,b)=>a-b);
  const cp=$("classPick"), prevCp=cp.value||"all";
  cp.innerHTML = `<option value="all">전체 반</option>` + cls.map(c=>`<option value="${c}">${c}반</option>`).join("");
  cp.value = [...cp.options].some(o=>o.value===prevCp)? prevCp : "all";
  const df=$("classDeptFilter"), prevDf=df.value||"all";
  df.innerHTML = `<option value="all">전체 학과</option><option value="none">미신청만</option>`
    + depts.map(d=>`<option value="${d.id}">${esc(d.name)}</option>`).join("");
  df.value = [...df.options].some(o=>o.value===prevDf)? prevDf : "all";
}
$("classPick").addEventListener("change", e=>{ classPick=e.target.value; render(); });
$("classDeptFilter").addEventListener("change", e=>{ classFilter=e.target.value; render(); });

const dot=(ord)=>`<span class="dot" style="background:${colorOf(ord)}"></span>`;
const miniBar=(filled,cap,ord)=>{ const pct=cap?Math.round(filled/cap*100):0;
  return `<span class="mini"><i style="width:${pct}%;background:${colorOf(ord)}"></i></span>`; };
const deptBadge=(name,ord)=>`<span class="dpill" style="background:${colorOf(ord)}">${esc(name)}</span>`;

function render(){
  const seatByVhash={}; seats.forEach(s=>seatByVhash[s.vhash]=s);
  $("summary").innerHTML =
    `신청 <b>${seats.length}</b>명 · 등록 학생 <b>${students.length}</b>명 · 학과 <b>${depts.length}</b>개`
    + (students.length?"":` · <span style="color:#dd5a4e">학생 명단이 없습니다. 제목을 5번 누르면 「학생 명단 가져오기」가 나타나요.</span>`);

  // ===== 현황: 표 =====
  const sumRows = depts.map(d=>{
    const full=d.filled>=d.capacity;
    return `<tr class="rowlink" data-go="${d.id}">
      <td class="nm">${dot(d.ord)} ${esc(d.name)}</td>
      <td>${miniBar(d.filled,d.capacity,d.ord)}<span class="cap"><b>${d.filled}</b> / ${d.capacity}</span></td>
      <td class="right">${full?'<span class="tag-full">마감</span>':`<span class="cap">잔여 ${d.capacity-d.filled}</span>`}</td>
      <td class="right chev">›</td>
    </tr>`;
  }).join("");
  $("summaryView").innerHTML = `<div class="panel"><table>
    <thead><tr><th>학과</th><th>신청 현황</th><th class="right">잔여</th><th></th></tr></thead>
    <tbody>${sumRows}</tbody></table></div>`;
  $("summaryView").querySelectorAll(".rowlink").forEach(el=>{
    el.addEventListener("click", ()=>{ switchTab("dept");
      const t=document.getElementById("dept-"+el.dataset.go); if(t) t.scrollIntoView({behavior:"smooth", block:"start"}); });
  });

  // ===== 학과별 명단 (학번 숨김, 반·번호 표시) =====
  const byDept={}; seats.forEach(s=>{(byDept[s.deptId] ||= []).push(s);});
  $("deptView").innerHTML = depts.map(d=>{
    const mem=(byDept[d.id]||[]).slice().sort((a,b)=>(a.classNo-b.classNo)||(a.studentNo-b.studentNo));
    const full=d.filled>=d.capacity;
    const rows = mem.length
      ? mem.map(m=>`<tr><td style="width:90px">${m.classNo}반 ${m.studentNo}번</td>
          <td class="nm">${esc(m.name)}</td>
          <td class="right" style="width:50px"><button class="rm" data-cancel="${m.vhash}">취소</button></td></tr>`).join("")
      : `<tr><td colspan="3" class="empty">아직 신청자가 없습니다.</td></tr>`;
    return `<div class="panel" id="dept-${d.id}">
      <div class="ph"><span class="nm">${dot(d.ord)} ${esc(d.name)}</span>
        <span class="cnt">${full?'<span class="tag-full">마감</span> ':''}<b>${d.filled}</b> / ${d.capacity}</span></div>
      <table><thead><tr><th>반·번호</th><th>이름</th><th></th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }).join("");
  $("deptView").querySelectorAll("[data-cancel]").forEach(b=>b.addEventListener("click", ()=>cancelSeat(b.dataset.cancel)));

  // ===== 반별 명단 =====
  renderClass(seatByVhash);

  // ===== 프로그램 소개 =====
  $("introView").innerHTML = `<div class="introlist">` + depts.map(d=>
    `<div class="icard" style="--dc:${colorOf(d.ord)}"><div class="t">${dot(d.ord)} ${esc(d.name)}</div><div class="d">${esc(d.detail||"")}</div></div>`
  ).join("") + `</div>`;
}

function renderClass(seatByVhash){
  // 학생을 반별로 그룹화
  const classes={};
  students.forEach(st=>{ const p=parseSid(st.studentId);
    (classes[p.classNo] ||= []).push({ ...st, ...p, seat:seatByVhash[st.vhash]||null }); });
  const keys=Object.keys(classes).map(Number).sort((a,b)=>a-b);
  if(!keys.length){ $("classView").innerHTML=`<div class="panel"><div class="empty">학생 명단을 먼저 등록하면 반별 명단이 표시됩니다.</div></div>`; return; }

  const showKeys = (classPick==="all") ? keys : keys.filter(c=>c===+classPick);

  $("classView").innerHTML = showKeys.map(c=>{
    const all=classes[c].slice().sort((a,b)=>a.studentNo-b.studentNo);
    const done=all.filter(x=>x.seat).length;

    // 학과 필터 적용된 표
    let list=all;
    if(classFilter==="none") list=all.filter(x=>!x.seat);
    else if(classFilter!=="all") list=all.filter(x=>x.seat && x.seat.deptId===classFilter);

    const rows = list.length ? list.map(x=>`<tr>
        <td style="width:54px">${x.studentNo}번</td>
        <td class="nm">${esc(x.name)}</td>
        <td>${x.seat?deptBadge(x.seat.deptName, ordOf[x.seat.deptId]):'<span class="npill">미신청</span>'}</td>
        <td class="right" style="width:50px"><button class="rm" data-del="${x.vhash}">삭제</button></td>
      </tr>`).join("") : `<tr><td colspan="4" class="empty">해당하는 학생이 없습니다.</td></tr>`;

    // 반 상세: 학과별로 우리 반 학생이 어떻게 들어가 있는지 (전체 학과 필터일 때만 표시)
    let breakdown="";
    if(classFilter==="all"){
      const byD={}; all.forEach(x=>{ if(x.seat){ (byD[x.seat.deptId] ||= []).push(x); } });
      const dlist=depts.filter(d=>byD[d.id]&&byD[d.id].length);
      if(dlist.length){
        breakdown = `<div class="subhead">📊 우리 반 학과별 신청 현황 <span class="c">(신청한 학생만)</span></div>`
          + `<table><tbody>` + dlist.map(d=>{
              const names=byD[d.id].sort((a,b)=>a.studentNo-b.studentNo)
                .map(x=>`${x.studentNo} ${esc(x.name)}`).join(", ");
              return `<tr><td style="width:200px">${deptBadge(d.name,d.ord)} <span class="cap">${byD[d.id].length}명</span></td>
                <td class="nm" style="font-weight:400;color:var(--body)">${names}</td></tr>`;
            }).join("") + `</tbody></table>`;
      }
    }

    const filterNote = classFilter==="all" ? `${done} / ${all.length} 신청`
                     : classFilter==="none" ? `미신청 ${list.length}명`
                     : `${list.length}명`;

    return `<div class="panel">
      <div class="ph"><span class="nm">🏫 ${c}반</span><span class="cnt">${filterNote}</span></div>
      <table><thead><tr><th>번호</th><th>이름</th><th>신청 학과</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      ${breakdown}
    </div>`;
  }).join("");
  $("classView").querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click", ()=>deleteStudent(b.dataset.del)));
}

async function cancelSeat(vhash){
  const s=seats.find(x=>x.vhash===vhash); if(!s) return;
  if(!confirm(`${s.name}(${s.classNo}반 ${s.studentNo}번) 학생의 '${s.deptName}' 신청을 취소할까요?`)) return;
  try {
    await runTransaction(db, async (tx)=>{
      const deptRef=doc(db,"departments",s.deptId);
      const ds=await tx.get(deptRef); const cur=ds.exists()?ds.data().filled:0;
      tx.update(deptRef,{filled:Math.max(0,cur-1)}); tx.delete(doc(db,"seats",vhash));
    });
  } catch(e){ console.error(e); alert("취소 중 오류가 발생했습니다."); }
}

async function deleteStudent(vhash){
  const st=students.find(x=>x.vhash===vhash); if(!st) return;
  const p=parseSid(st.studentId); const hasSeat=seats.find(x=>x.vhash===vhash);
  if(!confirm(`${st.name}(${p.classNo}반 ${p.studentNo}번) 학생을 명단에서 삭제할까요?`+(hasSeat?` 신청('${hasSeat.deptName}')도 함께 취소됩니다.`:""))) return;
  try {
    if(hasSeat){
      await runTransaction(db, async (tx)=>{
        const deptRef=doc(db,"departments",hasSeat.deptId);
        const ds=await tx.get(deptRef); const cur=ds.exists()?ds.data().filled:0;
        tx.update(deptRef,{filled:Math.max(0,cur-1)}); tx.delete(doc(db,"seats",vhash));
      });
    }
    await deleteDoc(doc(db,"students",vhash));
    setStatus(`${st.name} 학생을 삭제했습니다.`,"ok");
  } catch(e){ console.error(e); alert("삭제 중 오류가 발생했습니다."); }
}

$("addStuBtn").addEventListener("click", ()=>{ $("addMsg").textContent=""; $("addModal").classList.add("show"); });
$("addCancel").addEventListener("click", ()=>$("addModal").classList.remove("show"));
$("addConfirm").addEventListener("click", async ()=>{
  const sid=$("addSid").value.trim(), name=$("addName").value.trim(), birth=$("addBirth").value.trim();
  $("addMsg").style.color="#dd5a4e";
  if(!/^\d{5}$/.test(sid)) return $("addMsg").textContent="학번은 5자리 숫자로 입력해 주세요.";
  if(!name) return $("addMsg").textContent="이름을 입력해 주세요.";
  if(!/^\d{6}$/.test(birth)) return $("addMsg").textContent="생년월일은 6자리 숫자로 입력해 주세요.";
  try {
    const vh=await vhashOf(sid,birth);
    const exist=await getDoc(doc(db,"students",vh));
    if(exist.exists()){ $("addMsg").textContent="이미 등록된 학생입니다."; return; }
    await setDoc(doc(db,"students",vh), { name, studentId:sid });
    $("addMsg").style.color="#2f8f6a"; $("addMsg").textContent=`${name} 학생을 추가했습니다.`;
    $("addSid").value=""; $("addName").value=""; $("addBirth").value="";
  } catch(e){ console.error(e); $("addMsg").textContent="추가 중 오류가 발생했습니다."; }
});

$("seedBtn").addEventListener("click", async ()=>{
  const ex=await getDocs(collection(db,"departments"));
  if(!ex.empty && !confirm("이미 학과 데이터가 있습니다. 시드값으로 덮어쓸까요? (신청 수 filled가 0으로 초기화됩니다)")) return;
  if(ex.empty && !confirm("13개 학과를 정원 36명으로 생성합니다. 진행할까요?")) return;
  try { for(const s of SEED) await setDoc(doc(db,"departments",s.id),{ name:s.name, ord:s.ord, detail:s.detail, capacity:36, filled:0 });
    setStatus("학과 초기 세팅 완료","ok"); } catch(e){ console.error(e); setStatus("세팅 중 오류가 발생했습니다.","err"); }
});

$("recalcBtn").addEventListener("click", async ()=>{
  if(!confirm("실제 신청 내역을 기준으로 각 학과의 신청 수를 다시 계산합니다. (신청 숫자가 어긋났을 때 복구용) 진행할까요?")) return;
  try { const cnt={}; seats.forEach(s=>cnt[s.deptId]=(cnt[s.deptId]||0)+1);
    for(const d of depts) await setDoc(doc(db,"departments",d.id),{ filled:cnt[d.id]||0 },{ merge:true });
    setStatus("정원 재계산 완료","ok"); } catch(e){ console.error(e); setStatus("재계산 중 오류가 발생했습니다.","err"); }
});

$("importBtn").addEventListener("click", ()=>$("fileInput").click());
$("fileInput").addEventListener("change", async (e)=>{
  const file=e.target.files[0]; if(!file) return;
  setStatus("엑셀을 읽는 중…");
  try {
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"}); const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
    const pick=(row,keys)=>{ for(const k of Object.keys(row)){ if(keys.some(t=>k.includes(t))) return row[k]; } return ""; };
    const recs=[];
    for(const r of rows){
      const sid=String(pick(r,["학번"])).trim();
      const name=String(pick(r,["이름","성명"])).trim();
      const birth=normBirth(pick(r,["생년월일","생년","주민","생일"]));
      if(/^\d{5}$/.test(sid) && name && /^\d{6}$/.test(birth)) recs.push({sid,name,birth});
    }
    if(!recs.length){ setStatus("학번/이름/생년월일 형식을 인식하지 못했습니다.","err"); return; }
    if(!confirm(`${recs.length}명의 학생 명단을 등록합니다. 진행할까요?`)){ setStatus(""); return; }
    setStatus("등록 중…"); let done=0;
    for(let i=0;i<recs.length;i+=400){
      const chunk=recs.slice(i,i+400); const batch=writeBatch(db);
      for(const rec of chunk){ const vh=await vhashOf(rec.sid,rec.birth); batch.set(doc(db,"students",vh),{ name:rec.name, studentId:rec.sid }); }
      await batch.commit(); done+=chunk.length; setStatus(`등록 중… ${done}/${recs.length}`);
    }
    setStatus(`학생 명단 ${recs.length}명 등록 완료`,"ok");
  } catch(err){ console.error(err); setStatus("명단 가져오기 중 오류가 발생했습니다.","err"); }
  finally { e.target.value=""; }
});

function download(name,csv){ const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
$("csvDeptBtn").addEventListener("click", ()=>{
  const rows=seats.slice().sort((a,b)=>((ordOf[a.deptId]||0)-(ordOf[b.deptId]||0))||(a.classNo-b.classNo)||(a.studentNo-b.studentNo));
  let csv="학과,반,번호,이름,신청시각\n";
  rows.forEach(r=>{ const t=r.createdAt?.toDate?r.createdAt.toDate().toLocaleString("ko-KR"):"";
    csv+=`"${r.deptName}",${r.classNo},${r.studentNo},"${(r.name||"").replace(/"/g,'""')}","${t}"\n`; });
  download(`전공체험_학과별명단_${new Date().toISOString().slice(0,10)}.csv`, csv);
});
$("csvClassBtn").addEventListener("click", ()=>{
  const seatByVhash={}; seats.forEach(s=>seatByVhash[s.vhash]=s);
  const recs=students.map(st=>{ const p=parseSid(st.studentId); return {...p, name:st.name, seat:seatByVhash[st.vhash]||null}; })
    .sort((a,b)=>(a.classNo-b.classNo)||(a.studentNo-b.studentNo));
  let csv="반,번호,이름,신청학과,상태\n";
  recs.forEach(r=>{ csv+=`${r.classNo},${r.studentNo},"${(r.name||"").replace(/"/g,'""')}","${r.seat?r.seat.deptName:""}","${r.seat?"신청완료":"미신청"}"\n`; });
  download(`전공체험_반별명단_${new Date().toISOString().slice(0,10)}.csv`, csv);
});
</script>
