<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영화 속 직업 진로탐색 · 영화 신청</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#191f2e; --body:#414653; --muted:#8a8e9a; --line:#ecebe6; --line2:#e4e2da;
    --yellow:#1e2536; --yellow-d:#10151f; --on-yellow:#ffffff; --yellow-soft:#eef0f3; --band:#eef0f3;
    --ok:#1f5d45; --ok-soft:#e9f1ed; --danger:#b4493f; --danger-soft:#f6e8e6; --warn:#9a6b16; --warn-soft:#f5efe1;
    --surface:#ffffff; --page:#fdfcf9; --track:#f1f0eb;
    --shadow:0 1px 2px rgba(20,24,38,.04), 0 6px 22px rgba(20,24,38,.06);
    --r:16px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --ink:#eceef3; --body:#c2c6d0; --muted:#888d99; --line:#2a2e38; --line2:#343845;
      --yellow:#eceef3; --yellow-d:#ffffff; --on-yellow:#161922; --yellow-soft:#262b36; --band:#262b36;
      --ok:#6cc6a2; --ok-soft:#1b2e28; --danger:#f0938a; --danger-soft:#33211f; --warn:#e6b85c; --warn-soft:#2e2a1f;
      --surface:#1d2029; --page:#13151b; --track:#262a33;
      --shadow:0 2px 4px rgba(0,0,0,.25), 0 10px 26px rgba(0,0,0,.35);
    }
  }
  *{ box-sizing:border-box; }
  html{ overflow-y:scroll; scrollbar-gutter:stable; }
  body{ margin:0; font-family:"Pretendard","Apple SD Gothic Neo",system-ui,sans-serif; color:var(--body);
        font-size:16px; line-height:1.6; background:var(--page); -webkit-font-smoothing:antialiased; }
  .display{ font-family:"Fraunces","Nanum Myeongjo","Pretendard",serif; font-weight:600; letter-spacing:-.012em; }
  .wrap{ max-width:1080px; margin:0 auto; padding:0 16px 40px; }

  /* 게이트 */
  .gatewrap{ min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 16px; }
  .gbadge{ display:inline-block; background:none; color:var(--muted); font-weight:700; font-size:.76rem; letter-spacing:.12em; padding:0; }
  .gtitle{ font-family:"Fraunces","Nanum Myeongjo",serif; font-weight:700; font-size:clamp(2.3rem,7vw,3.5rem); line-height:1.04; color:var(--ink); margin:18px 0 10px; text-align:center; letter-spacing:-.02em; }
  .gsub{ color:var(--muted); font-size:.92rem; margin-bottom:14px; text-align:center; }
  .gcard{ width:100%; max-width:400px; background:var(--surface); border:1px solid var(--line2); border-radius:18px; padding:22px; box-shadow:var(--shadow); }
  .ginfo{ background:none; border:none; color:var(--body); font-weight:700; font-size:.86rem; cursor:pointer; margin-bottom:16px; text-decoration:underline; text-underline-offset:3px; }
  .seg{ display:flex; gap:4px; background:var(--track); padding:5px; border-radius:13px; margin-bottom:8px; }
  .seg button{ flex:1; padding:11px; border:none; border-radius:9px; background:transparent; color:var(--body); font-weight:700; font-size:.95rem; cursor:pointer; transition:.15s; }
  .seg button.on{ background:var(--surface); color:var(--ink); box-shadow:var(--shadow); }
  label{ display:block; font-size:.83rem; font-weight:600; margin:14px 0 6px; color:var(--body); }
  input,textarea{ width:100%; padding:13px 14px; border:1.5px solid var(--line2); border-radius:12px; font-size:1rem; background:var(--page); color:var(--ink); transition:.15s; font-family:inherit; }
  input::placeholder,textarea::placeholder{ color:var(--muted); }
  input:focus,textarea:focus{ outline:none; border-color:var(--yellow-d); background:var(--surface); box-shadow:0 0 0 3px rgba(25,31,46,.14); }
  .go{ width:100%; margin-top:18px; padding:14px; border:none; border-radius:12px; font-size:1.04rem; font-weight:700; cursor:pointer;
       background:var(--yellow); color:var(--on-yellow); box-shadow:0 4px 14px rgba(20,24,38,.16); transition:.15s; }
  .go:hover{ background:var(--yellow-d); } .go:disabled{ background:var(--line2); color:var(--muted); box-shadow:none; cursor:not-allowed; }
  .err{ color:var(--danger); font-size:.86rem; margin-top:10px; font-weight:600; min-height:1em; }

  /* 앱 헤더 + 탭 */
  .apphead{ position:sticky; top:0; z-index:20; background:var(--page); border-bottom:1px solid var(--line2); }
  .apphead .in{ max-width:1080px; margin:0 auto; padding:9px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:52px; }
  .apphead .ttl{ font-size:1.12rem; color:var(--ink); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .tt-main{ font-weight:800; }
  .hsub{ display:inline; }
  .appsub{ font-size:.76rem; color:var(--muted); font-weight:400; }
  .ttl .appsub::before{ content:"·"; margin:0 6px; color:var(--muted); }
  .apphead .who{ font-size:.78rem; color:var(--muted); font-weight:600; }
  .outbtn{ border:1.5px solid var(--line2); background:var(--surface); color:var(--body); border-radius:10px; padding:7px 12px; font-size:.82rem; font-weight:700; cursor:pointer; white-space:nowrap; flex:none; }
  .headright{ display:flex; align-items:center; gap:8px; flex:none; }
  .curbadge-h{ display:inline-flex; align-items:center; white-space:nowrap; background:var(--surface); color:var(--ok); border:1.5px solid var(--ok); border-radius:999px; padding:6px 12px; font-weight:700; font-size:.82rem; }
  .live{ display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:999px; background:var(--track); color:var(--muted); font-weight:700; font-size:.82rem; white-space:nowrap; border:1px solid var(--line); }
  .dotpulse{ width:8px; height:8px; border-radius:50%; background:var(--ok); animation:pulse 1.6s infinite; }
  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(47,143,106,.5);} 70%{box-shadow:0 0 0 7px rgba(47,143,106,0);} 100%{box-shadow:0 0 0 0 rgba(47,143,106,0);} }
  @media (prefers-reduced-motion: reduce){ .dotpulse{ animation:none; } }
  .tabbar{ max-width:1080px; margin:0 auto; padding:8px 16px 0; display:flex; gap:6px; }
  .tabbtn{ flex:1; max-width:220px; padding:11px 10px; border:none; border-radius:12px 12px 0 0; background:transparent; color:var(--muted);
           font-weight:700; font-size:.95rem; cursor:pointer; border-bottom:3px solid transparent; transition:.15s; white-space:nowrap; }
  .tabbtn.on{ color:var(--ink); border-bottom-color:var(--yellow-d); }

  .panel{ display:none; padding-top:12px; }
  .panel.on{ display:block; }

  /* 안내 */
  .guide{ background:var(--surface); border:1px solid var(--line2); border-radius:var(--r); box-shadow:var(--shadow); padding:20px 22px; }
  .guide h2{ font-size:1.65rem; color:var(--ink); margin:0 0 6px; letter-spacing:-.01em; }
  .guide .gd-sub{ color:var(--muted); font-size:.92rem; margin:0 0 16px; }
  .mybox{ background:var(--ok-soft); border:1.5px solid var(--ok); border-radius:13px; padding:13px 16px; margin-bottom:16px; }
  .mybox .ttl2{ font-weight:800; color:var(--ok); font-size:1.02rem; }
  .mybox .sub2{ color:var(--body); font-size:.9rem; margin-top:3px; }
  .sched{ width:100%; border-collapse:collapse; margin:6px 0 18px; }
  .sched th,.sched td{ padding:9px 10px; border-bottom:1px solid var(--line); text-align:left; font-size:.92rem; }
  .sched th{ color:var(--muted); font-weight:700; font-size:.8rem; }
  .sched td.per{ font-weight:800; color:var(--ink); white-space:nowrap; width:84px; }
  .sched td.act{ color:var(--body); }
  .sched .who2{ display:inline-block; font-size:.74rem; font-weight:700; padding:2px 9px; border-radius:999px; background:var(--yellow-soft); color:var(--warn); white-space:nowrap; }
  .gsteps{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .gstep{ background:var(--page); border:1px solid var(--line2); border-left:4px solid var(--yellow-d); border-radius:12px; padding:11px 14px; }
  .gstep .h{ font-weight:800; color:var(--ink); font-size:.92rem; margin-bottom:3px; }
  .gstep .b{ font-size:.86rem; color:var(--body); }
  .gnote{ margin-top:14px; padding:11px 14px; background:var(--warn-soft); border:1px solid var(--warn); border-radius:11px; font-size:.88rem; color:var(--ink); font-weight:600; }
  @media (max-width:520px){ .gsteps{ grid-template-columns:1fr; } }

  /* 신청 패널 */
  .hellorow{ display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; margin:6px 0 4px; }
  .hello{ font-size:1.12rem; font-weight:700; color:var(--ink); margin:0; }
  .lead{ color:var(--muted); font-size:.92rem; margin:0 0 16px; }
  .grid{ display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:9px; }
  .blk{ position:relative; text-align:left; background:var(--surface); border:1.5px solid var(--line2); border-radius:13px; padding:11px 12px; cursor:pointer; transition:.14s; }
  .blk:hover{ border-color:var(--yellow-d); transform:translateY(-2px); box-shadow:var(--shadow); }
  .blk .nm{ font-weight:700; color:var(--ink); font-size:.97rem; line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .blk .dt{ font-size:.79rem; color:var(--muted); margin-top:3px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; min-height:3.3em; }
  .blk .bartrack{ height:5px; background:var(--track); border-radius:5px; overflow:hidden; margin-top:8px; }
  .blk .barfill{ height:100%; background:var(--yellow-d); border-radius:5px; transition:width .3s; }
  .blk .seat{ margin-top:6px; font-size:.82rem; font-weight:700; color:var(--ok); }
  .blk.selected{ border-color:var(--yellow-d); background:var(--yellow-soft); box-shadow:0 0 0 2.5px rgba(20,24,38,.16); }
  .blk.selected::after{ content:"✓"; position:absolute; top:8px; right:8px; display:grid; place-items:center; width:18px; height:18px; background:var(--yellow-d); color:var(--on-yellow); border-radius:50%; font-size:.7rem; font-weight:800; }
  .blk.full{ opacity:.5; cursor:not-allowed; } .blk.full:hover{ border-color:var(--line2); transform:none; box-shadow:none; } .blk.full .seat{ color:var(--danger); }
  .blk.mine{ border-color:var(--ok); background:var(--ok-soft); }
  .blk.mine .nm{ padding-right:48px; }
  .blk.mine::after{ content:"신청함"; position:absolute; top:9px; right:9px; font-size:.7rem; font-weight:700; color:#fff; background:var(--ok); padding:2px 8px; border-radius:999px; }
  .blk.locked{ cursor:default; } .blk.locked:not(.mine):hover{ border-color:var(--line2); transform:none; box-shadow:none; }
  .bigbtn{ width:100%; margin-top:16px; padding:15px; border:none; border-radius:13px; font-size:1.04rem; font-weight:700; cursor:pointer; background:var(--yellow); color:var(--on-yellow); }
  .bigbtn:hover{ background:var(--yellow-d); } .bigbtn:disabled{ background:var(--line2); color:var(--muted); box-shadow:none; cursor:not-allowed; }
  .bigbtn.danger{ background:var(--surface); color:var(--danger); border:1.5px solid var(--danger); box-shadow:none; }
  .msg{ margin-top:14px; padding:12px 14px; border-radius:12px; font-size:.92rem; font-weight:600; display:none; border:1.5px solid transparent; text-align:center; }
  .msg.show{ display:block; } .msg.success{ background:var(--ok-soft); color:var(--ok); border-color:var(--ok); } .msg.error{ background:var(--yellow-soft); color:var(--danger); border-color:var(--danger); } .msg.info{ background:var(--yellow-soft); color:var(--ink); border-color:var(--yellow-d); }
  .gatebanner{ margin:2px 0 10px; padding:8px 13px; border-radius:10px; font-weight:700; font-size:.88rem; text-align:center; border:1px solid transparent; }
  .gatebanner.wait{ background:var(--yellow-soft); color:var(--warn); border-color:var(--yellow-d); }
  .gatebanner.open{ background:var(--ok-soft); color:var(--ok); border-color:var(--ok); }
  .gatebanner.closed{ background:var(--danger-soft); color:var(--danger); border-color:var(--danger); }
  .gatebanner .cd{ font-variant-numeric:tabular-nums; }
  .gateadmin{ background:var(--surface); border:1px solid var(--line2); border-radius:12px; padding:8px 12px; margin-bottom:12px; }
  .gateadmin .ga-main{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .gateadmin .ga-state{ font-weight:700; font-size:.9rem; flex:1; min-width:150px; }
  .gateadmin .ga-btns{ display:flex; gap:6px; flex-wrap:wrap; }
  .gateadmin .ga-sched{ display:flex; align-items:center; gap:8px; flex-wrap:nowrap; margin-top:8px; padding-top:8px; border-top:1px solid var(--line); }
  .gateadmin .ga-sched label{ flex:none; margin:0; }
  .gateadmin label{ font-size:.84rem; color:var(--muted); font-weight:700; }
  .gateadmin input[type=datetime-local]{ flex:1; min-width:0; padding:6px 9px; border:1.5px solid var(--line2); border-radius:9px; background:var(--page); color:var(--ink); font-size:.84rem; font-family:inherit; }
  .gateadmin .ga-sched button{ flex:none; }
  .gateadmin button{ border:none; border-radius:9px; padding:6px 12px; font-weight:700; font-size:.83rem; cursor:pointer; white-space:nowrap; }
  .gateadmin .ga-open{ background:var(--ok); color:#fff; }
  .gateadmin .ga-close{ background:var(--danger); color:#fff; }
  .gateadmin button.ghost{ background:var(--page); color:var(--body); border:1.5px solid var(--line2); }
  .gateadmin button:disabled{ opacity:.4; cursor:default; }

  /* 대시보드 */
  .kpis{ display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:16px; }
  .kpi{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:10px 14px; box-shadow:var(--shadow); display:flex; align-items:center; gap:11px; }
  .kpi .ic{ width:30px; height:30px; border-radius:9px; display:grid; place-items:center; font-size:.98rem; background:var(--yellow-soft); flex:none; }
  .kpi .v{ font-size:1.45rem; font-weight:800; color:var(--ink); line-height:1.05; letter-spacing:-.02em; }
  .kpi .l{ font-size:.76rem; color:var(--muted); margin-top:1px; font-weight:600; }
  .kpi.warn .ic{ background:var(--warn-soft); } .kpi.warn .v{ color:var(--warn); }
  .board{ display:grid; grid-template-columns:1.25fr 1fr; gap:14px; align-items:start; }
  .col{ display:flex; flex-direction:column; gap:14px; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); overflow:hidden; }
  .card .ch{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:14px 16px 10px; }
  .card .ch .t{ font-weight:700; color:var(--ink); font-size:1.02rem; }
  .card .ch .meta{ font-size:.8rem; color:var(--muted); font-weight:600; }
  .card .cb{ padding:2px 16px 14px; }
  .ditem{ padding:8px 0; border-bottom:1px solid var(--line); }
  .ditem .dtop{ display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .ditem .nm{ font-weight:600; color:var(--ink); font-size:.9rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ditem .num{ font-size:.82rem; font-weight:700; color:var(--body); white-space:nowrap; font-variant-numeric:tabular-nums; }
  .ditem .track{ height:4px; background:var(--track); border-radius:5px; overflow:hidden; margin-top:5px; }
  .ditem .track > i{ display:block; height:100%; border-radius:5px; background:var(--yellow-d); transition:width .4s; }
  .cgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }
  .citem{ display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; cursor:pointer;
          background:var(--page); border:1px solid var(--line2); border-radius:9px; padding:5px 4px; line-height:1.25; transition:.13s; }
  .citem:hover{ border-color:var(--yellow-d); transform:translateY(-1px); box-shadow:var(--shadow); }
  .citem .cn{ font-weight:700; color:var(--ink); font-size:.82rem; }
  .citem .cf{ font-size:.7rem; color:var(--muted); font-variant-numeric:tabular-nums; }
  .citem .pc{ font-weight:800; color:var(--yellow-d); font-size:.86rem; font-variant-numeric:tabular-nums; }
  .citem.zero .pc{ color:var(--muted); }
  .warnrow{ display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid var(--line); font-size:.88rem; }
  .warnrow:last-child{ border:none; }
  .warnrow .wc{ font-weight:700; color:var(--ink); flex:none; min-width:38px; }
  .warnrow .wm{ flex:1; color:var(--body); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .warnrow .wn{ font-weight:800; font-variant-numeric:tabular-nums; }
  .warnrow .wn.z{ color:var(--danger); } .warnrow .wn.o{ color:var(--warn); }
  .empty{ color:var(--muted); font-size:.86rem; padding:12px 0; text-align:center; }

  /* 관리 */
  .mgbar{ display:flex; align-items:center; gap:10px; margin-bottom:7px; flex-wrap:wrap; }
  .mgbar .spacer{ flex:1; }
  .tabs{ display:inline-flex; gap:4px; background:var(--track); padding:5px; border-radius:13px; flex-wrap:wrap; }
  .tab{ padding:9px 16px; border-radius:9px; background:transparent; color:var(--muted); cursor:pointer; font-weight:700; font-size:.9rem; }
  .tab.active{ background:var(--surface); color:var(--ink); box-shadow:var(--shadow); }
  .mgbar button{ border:none; border-radius:11px; background:var(--yellow); color:var(--on-yellow); font-weight:700; cursor:pointer; padding:9px 14px; font-size:.86rem; }
  .ghost{ background:var(--surface); color:var(--body); border:1.5px solid var(--line2); font-weight:600; border-radius:11px; padding:9px 14px; font-size:.86rem; cursor:pointer; }
  .ghost:hover{ background:var(--track); }
  .bar{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:14px; }
  #status{ font-size:.85rem; color:var(--warn); margin-bottom:10px; min-height:1em; font-weight:600; }
  #status:empty{ display:none; margin:0; min-height:0; } #status.err{ color:var(--danger); } #status.ok{ color:var(--ok); }
  .summary{ background:var(--surface); border:1px solid var(--line2); border-radius:14px; padding:13px 16px; margin-bottom:14px; font-size:.96rem; color:var(--body); box-shadow:var(--shadow); }

  /* 영화 설정 */
  .mvgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; }
  .mvcard{ background:var(--surface); border:1px solid var(--line2); border-left:5px solid var(--yellow-d); border-radius:14px; padding:13px 15px; box-shadow:var(--shadow); }
  .mvcard .mh{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .mvcard .mn{ font-weight:700; color:var(--ink); font-size:1.02rem; }
  .mvcard .mcap{ font-size:.8rem; font-weight:700; color:var(--body); white-space:nowrap; }
  .mvcard .md{ font-size:.83rem; color:var(--muted); margin:4px 0 9px; line-height:1.5; min-height:1.2em; }
  .mvcard .macts{ display:flex; gap:8px; }
  .mvcard .macts button{ border:none; background:none; cursor:pointer; font-size:.82rem; font-weight:700; padding:0; }
  .mvcard .me{ color:var(--yellow-d); } .mvcard .mr{ color:var(--danger); }

  /* 반별 조편성 */
  .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
  .chip{ display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:999px; background:var(--surface); border:1.5px solid var(--line2); color:var(--body); cursor:pointer; font-size:.88rem; font-weight:700; }
  .chip.active{ background:var(--yellow-d); border-color:var(--yellow-d); color:var(--on-yellow); }
  .grpgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
  .grpcard{ background:var(--surface); border:1px solid var(--line2); border-left:4px solid var(--yellow-d); border-radius:13px; padding:12px 14px; box-shadow:var(--shadow); }
  .grpcard.thin{ border-left-color:var(--danger); }
  .grpcard.none{ border-left-color:var(--line2); }
  .grpcard .gh{ display:flex; justify-content:space-between; align-items:center; gap:6px; margin-bottom:7px; }
  .grpcard .gn{ font-weight:700; color:var(--ink); font-size:.92rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .grpcard .gc{ font-size:.76rem; font-weight:700; padding:1px 8px; border-radius:999px; background:var(--track); color:var(--body); white-space:nowrap; }
  .grpcard .gc.warn{ background:var(--warn-soft); color:var(--warn); }
  .mtag{ display:inline-flex; align-items:center; gap:5px; font-size:.78rem; background:var(--page); border:1px solid var(--line2); border-radius:8px; padding:3px 7px; margin:2px 3px 0 0; }
  .mtag .gear{ background:none; border:none; cursor:pointer; opacity:.5; padding:0; font-size:.85rem; }
  .mtag .gear:hover{ opacity:1; }
  .gmuted{ color:var(--muted); font-size:.82rem; }

  /* 전교생 */

async function sha256Hex(str){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str)); return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }
const normBirth=(s)=>String(s).replace(/\D/g,"").padStart(6,"0").slice(-6);

/* ===== 구독 ===== */
function subscribe(){
  unsub.push(onSnapshot(gateRef(), s=>{ gate = s.exists()? {open:!!s.data().open, openAt:s.data().openAt||null} : {open:false,openAt:null}; renderGate(); }, e=>console.error(e)));
  if(!gateTimer) gateTimer=setInterval(renderGate, 1000);
  unsub.push(onSnapshot(query(itemsCol(),orderBy("ord")), s=>{
    items=s.docs.map(d=>({id:d.id,...d.data()}));
    if(!qnaPick && items.length) qnaPick=items[0].id;
    renderApply(); renderDash(); renderManage(); renderQna(); renderGuide();
  }, e=>console.error(e)));
  if(role==="student"){
    unsubSeat=onSnapshot(evDoc("seats",me.vhash), s=>{ seat=s.exists()?s.data():null; if(seat) selectedId=null; renderApply(); renderGuide(); });
    unsubCounts=onSnapshot(cntCol(me.classNo), s=>{ myCounts={}; s.docs.forEach(d=>myCounts[d.id]=d.data().n||0); renderApply(); });
  }
  if(role==="teacher"){
    unsub.push(onSnapshot(seatsCol(), s=>{ seats=s.docs.map(d=>({vhash:d.id,...d.data()})); renderDash(); renderManage(); }, e=>console.error(e)));
    unsub.push(onSnapshot(collection(db,"students"), s=>{ students=s.docs.map(d=>({vhash:d.id,...d.data()})); buildFilters(); renderDash(); renderManage(); }, e=>console.error(e)));
  }
  unsub.push(onSnapshot(query(questionsCol(),orderBy("createdAt","desc")), s=>{ questions=s.docs.map(d=>({id:d.id,...d.data()})); if(curTab==="qna") renderQna(); }, e=>console.error(e)));
  if(role==="teacher") pollTimer=setInterval(pollOnce, 30000);
}
async function pollOnce(){
  try{
    const res=await Promise.all([ getDocs(query(itemsCol(),orderBy("ord"))), getDocs(seatsCol()), getDocs(collection(db,"students")) ]);
    items=res[0].docs.map(d=>({id:d.id,...d.data()}));
    seats=res[1].docs.map(d=>({vhash:d.id,...d.data()}));
    students=res[2].docs.map(d=>({vhash:d.id,...d.data()}));
    renderDash(); renderManage();
  }catch(e){}
}

/* ===== 신청 ===== */
function renderApply(){
  if(role!=="student") return;
  $("applyLead").textContent = `🎬 우리 반(${me.classNo}반)에서 볼 영화를 1편 신청하세요. 같은 영화를 고른 친구들이 한 모둠이 됩니다. 자리가 남아 있으면 취소 후 다시 신청할 수 있어요.`;
  const locked=!!seat;
  if(!items.length){ $("grid").innerHTML=`<div class="empty">아직 영화 목록이 준비되지 않았어요. 잠시만 기다려 주세요.</div>`; }
  else $("grid").innerHTML = items.map(d=>{
    const n=myCounts[d.id]||0, cap=d.perClass||0, rem=cap-n, full=rem<=0, pct=cap?Math.round(n/cap*100):0;
    const isMine=seat&&seat.movieId===d.id, isSel=!locked&&selectedId===d.id;
    let cls="blk"; if(isMine) cls+=" mine locked"; else if(locked) cls+=" locked"; else if(full) cls+=" full"; else if(isSel) cls+=" selected";
    return `<div class="${cls}" data-id="${d.id}" ${(!locked&&!full)?'role="button"':''}>
      <div class="nm" title="${esc(d.name)}">${esc(d.name)}</div><div class="dt">${esc(d.detail||"")}</div>
      <div class="bartrack"><div class="barfill" style="width:${pct}%"></div></div>
      <div class="seat">${full&&!isMine?`마감 · ${n}/${cap}`:`${n}/${cap} · 잔여 ${rem}석`}</div></div>`;
  }).join("");
  if(!locked) $("grid").querySelectorAll(".blk:not(.full)").forEach(el=>el.addEventListener("click", ()=>{ selectedId=el.dataset.id; renderApply(); }));
  if(seat){
    $("seatBadge").innerHTML=`<span class="curbadge-h">🎬 ${esc(seat.movieName)}</span>`;
    $("applyBtn").style.display="none"; $("cancelBtn").style.display="block";
  }else{
    $("seatBadge").innerHTML="";
    $("applyBtn").style.display="block"; $("cancelBtn").style.display="none";
  }
  syncApplyLock(isOpen());
}
$("applyBtn").addEventListener("click", async ()=>{
  clearMsg($("mainMsg"));
  if(!isOpen()) return showMsg($("mainMsg"),"아직 신청이 열리지 않았습니다.","error");
  if(!selectedId) return showMsg($("mainMsg"),"신청할 영화를 선택해 주세요.","error");
  $("applyBtn").disabled=true; $("applyBtn").textContent="신청 중…";
  try{
    const r=await runTransaction(db, async (tx)=>{
      const seatRef=evDoc("seats",me.vhash), itemRef=evDoc("items",selectedId), cRef=cntDoc(me.classNo,selectedId);
      const ss=await tx.get(seatRef); if(ss.exists()) return {s:"HAS",n:ss.data().movieName};
      const is=await tx.get(itemRef); if(!is.exists()) return {s:"ERR"};
      const cap=is.data().perClass||0;
      const cs=await tx.get(cRef); const n=cs.exists()?(cs.data().n||0):0;
      if(n>=cap) return {s:"FULL",n:is.data().name};
      tx.set(seatRef,{ studentId:me.studentId, name:me.name, classNo:me.classNo, studentNo:me.studentNo, movieId:selectedId, movieName:is.data().name, createdAt:serverTimestamp() });
      tx.set(cRef,{ n:n+1 });
      return {s:"OK",n:is.data().name};
    });
    if(r.s==="OK") showMsg($("mainMsg"),`🎉 '${r.n}' 신청이 완료되었습니다!`,"success");
    else if(r.s==="FULL") showMsg($("mainMsg"),`방금 '${r.n}'가 우리 반에서 마감되었습니다. 다른 영화를 선택해 주세요.`,"error");
    else if(r.s==="HAS") showMsg($("mainMsg"),`이미 '${r.n}'에 신청되어 있습니다.`,"info");
    else showMsg($("mainMsg"),"영화 정보를 찾을 수 없습니다.","error");
  }catch(e){ console.error(e); showMsg($("mainMsg"),"신청 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.","error"); }
  finally{ $("applyBtn").textContent="신청하기"; syncApplyLock(isOpen()); }
});
$("cancelBtn").addEventListener("click", async ()=>{
  if(!confirm("신청을 취소할까요? 취소 후 다른 영화를 다시 선택할 수 있습니다.")) return;
  clearMsg($("mainMsg"));
  try{
    await runTransaction(db, async (tx)=>{
      const seatRef=evDoc("seats",me.vhash); const ss=await tx.get(seatRef); if(!ss.exists()) return;
      const mid=ss.data().movieId, cNo=ss.data().classNo;
      const cRef=cntDoc(cNo,mid); const cs=await tx.get(cRef);
      if(cs.exists()){ const n=cs.data().n||0; tx.set(cRef,{ n:Math.max(0,n-1) }); }
      tx.delete(seatRef);
    });
    showMsg($("mainMsg"),"신청이 취소되었습니다. 원하는 영화를 다시 선택해 주세요.","info");
  }catch(e){ console.error(e); showMsg($("mainMsg"),"취소 중 오류가 발생했습니다.","error"); }
});

/* ===== 게이트 표시 ===== */
function openAtMs(){ const v=gate.openAt; if(!v) return null; if(typeof v?.toDate==="function") return v.toDate().getTime(); if(v instanceof Date) return v.getTime(); const n=new Date(v).getTime(); return isNaN(n)?null:n; }
function isOpen(){ if(gate.open===true) return true; const t=openAtMs(); return t!=null && Date.now()>=t; }
function fmtCountdown(ms){ if(ms<0) ms=0; const s=Math.floor(ms/1000); const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60; const p=n=>String(n).padStart(2,"0"); return h>0?`${h}:${p(m)}:${p(sec)}`:`${p(m)}:${p(sec)}`; }
function fmtTime(ms){ const d=new Date(ms); const p=n=>String(n).padStart(2,"0"); return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function renderGate(){ try{ _renderGate(); }catch(e){ console.error("renderGate:",e); } }
function _renderGate(){
  const open=isOpen(), t=openAtMs();
  const b=$("gateBanner");
  if(b){
    if(role==="student"){
      b.style.display="block";
      if(open){ b.className="gatebanner open"; b.textContent="🟢 신청이 열렸습니다. 보고 싶은 영화를 신청하세요!"; }
      else if(t!=null && Date.now()<t){ b.className="gatebanner wait"; b.innerHTML=`⏳ 신청 대기 중 · 오픈까지 <span class="cd">${fmtCountdown(t-Date.now())}</span> (${fmtTime(t)} 오픈)`; }
      else { b.className="gatebanner closed"; b.textContent="🔴 아직 신청이 열리지 않았습니다. 잠시만 기다려 주세요."; }
    } else b.style.display="none";
  }
  if(role==="student") syncApplyLock(open);
  const ga=$("gateAdmin");
  if(ga){
    if(role==="teacher"){
      ga.style.display="block";
      if(t!=null && Date.now()>=t && !gate.open){ setGate({open:true, openAt:null}); }
      const st=$("gaState");
      if(open) st.innerHTML=`현재 상태: <span style="color:var(--ok)">🟢 신청 열림</span>`;
      else if(t!=null && Date.now()<t) st.innerHTML=`현재 상태: <span style="color:var(--warn)">⏳ 예약됨</span> · ${fmtTime(t)} 자동 오픈 (${fmtCountdown(t-Date.now())} 남음)`;
      else st.innerHTML=`현재 상태: <span style="color:var(--danger)">🔴 신청 닫힘</span>`;
      $("gateOpenBtn").disabled=open; $("gateCloseBtn").disabled=(!gate.open && t==null);
    } else ga.style.display="none";
  }
}
function syncApplyLock(open){
  const a=$("applyBtn"), c=$("cancelBtn"); if(!a||!c) return;
  if(seat){ a.style.display="none"; c.style.display="block"; c.disabled=false; c.textContent="신청 취소하고 다시 선택"; }
  else { c.style.display="none"; a.style.display="block"; a.disabled=!open||!selectedId; a.textContent=open?"신청하기":"🔒 신청 대기 중"; }
}

$("gateCloseBtn")?.addEventListener("click", ()=>{ if(confirm("신청을 닫을까요? 예약된 오픈 시각도 함께 해제됩니다.")) setGate({open:false, openAt:null}); });

function classGroups(){
  const byV={}; seats.forEach(s=>byV[s.vhash]=s);
  const classes={};
  students.forEach(st=>{ const p=parseSid(st.studentId); (classes[p.classNo] ||= []).push({ ...st, ...p, seat:byV[st.vhash]||null }); });
  return classes;
}
function renderDash(){ if(role!=="teacher") return; try{ _renderDash(); }catch(e){ console.error("dash:",e); } }
function _renderDash(){
  const classes=classGroups();
  const classNos=Object.keys(classes).map(Number).sort((a,b)=>a-b);
  const stuN=students.length, filled=seats.length, na=Math.max(0,stuN-filled);
  const rate=stuN?Math.round(filled/stuN*100):0;
  // 점검: (반,영화) 0~1명 조
  let smallGroups=[];
  classNos.forEach(c=>{
    const cnt={}; classes[c].forEach(x=>{ if(x.seat) cnt[x.seat.movieId]=(cnt[x.seat.movieId]||0)+1; });
    items.forEach(m=>{ const n=cnt[m.id]||0; if(n>0 && n<2) smallGroups.push({c, name:m.name, n}); });
  });
  const emptyGroups=(()=>{ let z=0; classNos.forEach(c=>{ const used=new Set(classes[c].filter(x=>x.seat).map(x=>x.seat.movieId)); items.forEach(m=>{ if(!used.has(m.id)) {} }); }); return z; })();

  $("kpis").innerHTML=`
    <div class="kpi"><div class="ic">🙋</div><div><div class="v">${filled}</div><div class="l">신청 완료</div></div></div>
    <div class="kpi"><div class="ic">⏳</div><div><div class="v">${na}</div><div class="l">미신청</div></div></div>
    <div class="kpi"><div class="ic">👥</div><div><div class="v">${stuN||"–"}</div><div class="l">전교생</div></div></div>
    <div class="kpi"><div class="ic">📈</div><div><div class="v">${stuN?rate+'<span style="font-size:.9rem">%</span>':"–"}</div><div class="l">신청률</div></div></div>
    <div class="kpi ${smallGroups.length?"warn":""}"><div class="ic">⚠️</div><div><div class="v">${smallGroups.length}</div><div class="l">점검 필요</div></div></div>`;

  // 영화별 총 신청
  const totByMv={}; seats.forEach(s=>totByMv[s.movieId]=(totByMv[s.movieId]||0)+1);
  const totalCap = items.reduce((s,m)=>s+(m.perClass||0)*classNos.length,0);
  $("mvMeta").textContent = items.length?`${items.length}편`:"";
  $("mvList").innerHTML = items.length ? items.map(m=>{
    const n=totByMv[m.id]||0, cap=(m.perClass||0)*classNos.length, pct=cap?Math.round(n/cap*100):0;
    return `<div class="ditem"><div class="dtop"><span class="nm">${esc(m.name)}</span><span class="num">${n}${cap?` / ${cap}`:""}명</span></div>
      <div class="track"><i style="width:${pct}%"></i></div></div>`;
  }).join("") : `<div class="empty">영화를 먼저 등록해 주세요. (관리 → 영화 설정)</div>`;

  // 반별 신청률
  $("classMeta").textContent = classNos.length?`${classNos.length}개 반`:"";
  $("classList").innerHTML = classNos.length ? classNos.map(c=>{
    const t=classes[c].length, dn=classes[c].filter(x=>x.seat).length, pct=t?Math.round(dn/t*100):0;
    return `<div class="citem ${dn===0?"zero":""}" data-goclass="${c}"><span class="cn">${c}반</span><span class="cf">${dn}/${t}</span><span class="pc">${pct}%</span></div>`;
  }).join("") : `<div class="empty">학생 명단이 없습니다.</div>`;
  $("classList").querySelectorAll("[data-goclass]").forEach(el=>el.addEventListener("click", ()=>{ classPick=el.dataset.goclass; showTab("manage"); mgSwitch("groups"); document.querySelector("#panelManage")?.scrollIntoView({behavior:"smooth",block:"start"}); }));

  // 점검 필요
  $("warnMeta").textContent = smallGroups.length?`${smallGroups.length}건`:"";
  $("warnList").innerHTML = smallGroups.length ? smallGroups.sort((a,b)=>a.c-b.c).map(g=>`
    <div class="warnrow"><span class="wc">${g.c}반</span><span class="wm">${esc(g.name)}</span><span class="wn ${g.n===0?"z":"o"}">${g.n}명</span></div>`).join("")
    : `<div class="empty">2명 미만 조가 없어요. 👍</div>`;
}

      const list=(byMv[m.id]||[]).sort((a,b)=>a.studentNo-b.studentNo);

function tagHTML(x){ return `<span class="mtag">${x.studentNo} ${esc(x.name)}<button class="gear" data-menu="${x.vhash}" title="설정">⚙</button></span>`; }
function renderAll(){

    const all=classes[c].slice().sort((a,b)=>a.studentNo-b.studentNo);

async function deleteMovie(id){
  const m=items.find(x=>x.id===id); if(!m) return;
  const cnt=seats.filter(s=>s.movieId===id).length;
  if(!confirm(`'${m.name}' 영화를 삭제할까요?`+(cnt?` 현재 ${cnt}명이 신청한 상태이며, 그 학생들의 신청도 함께 취소됩니다.`:""))) return;
  try{
    if(cnt){ const batch=writeBatch(db); seats.filter(s=>s.movieId===id).forEach(s=>batch.delete(evDoc("seats",s.vhash))); await batch.commit(); }
    // 카운터 정리
    const classNos=[...new Set(students.map(st=>parseSid(st.studentId).classNo))];
    for(const c of classNos){ try{ await deleteDoc(cntDoc(c,id)); }catch(e){} }
    await deleteDoc(evDoc("items",id));
    setStatus(`'${m.name}' 삭제 완료`,"ok");
  }catch(e){ console.error(e); setStatus("삭제 중 오류가 발생했습니다.","err"); }
}

async function seedMovies(count, perClass){
  if(!confirm(`기존 영화 목록을 지우고, 샘플 ${count}편(반당 ${perClass}명)으로 새로 만들까요? 제목은 나중에 '수정'에서 바꾸면 돼요.`)) return;
  try{
    const ex=await getDocs(itemsCol());
    const batch=writeBatch(db); ex.docs.forEach(d=>batch.delete(d.ref)); await batch.commit();
    for(let i=1;i<=count;i++) await setDoc(evDoc("items","m"+String(i).padStart(2,"0")), { name:`영화 ${i}`, detail:"", perClass, ord:i });
    setStatus(`샘플 ${count}편 세팅 완료 — 제목/설명을 수정해 주세요.`,"ok");
  }catch(e){ console.error(e); setStatus("세팅 중 오류가 발생했습니다.","err"); }
}

      await setDoc(evDoc("items","m"+String(i+1).padStart(2,"0")), { name:m.name, detail:m.detail||"", where:m.where||"", perClass:m.perClass||3, ord:i+1 });
    }
    setStatus(`조사된 영화 ${MOVIE_SEED.length}편 세팅 완료 🎬`,"ok");
  }catch(e){ console.error(e); setStatus("세팅 중 오류가 발생했습니다.","err"); }
}
$("recalcBtn").addEventListener("click", async ()=>{
  if(!confirm("실제 신청 내역을 기준으로 반×영화 카운터를 다시 계산합니다. (숫자 어긋남 복구용) 진행할까요?")) return;
  try{
    const cnt={}; seats.forEach(s=>{ const k=s.classNo+"|"+s.movieId; cnt[k]=(cnt[k]||0)+1; });
    const classNos=[...new Set(students.map(st=>parseSid(st.studentId).classNo))];
    let batch=writeBatch(db), ops=0;
    for(const c of classNos){ for(const m of items){ batch.set(cntDoc(c,m.id), { n: cnt[c+"|"+m.id]||0 }); if(++ops>=400){ await batch.commit(); batch=writeBatch(db); ops=0; } } }
    if(ops) await batch.commit();
    setStatus("정원 재계산 완료","ok");
  }catch(e){ console.error(e); setStatus("재계산 중 오류가 발생했습니다.","err"); }
});

/* 학생 명단 가져오기 (전공체험과 동일 형식) */
$("importBtn").addEventListener("click", ()=>$("fileInput").click());
$("fileInput").addEventListener("change", async (e)=>{
  const file=e.target.files[0]; if(!file) return;
  setStatus("엑셀을 읽는 중…");
  try{
    const buf=await file.arrayBuffer(); const wb=XLSX.read(buf,{type:"array"}); const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
    const pick=(row,keys)=>{ for(const k of Object.keys(row)){ if(keys.some(t=>k.includes(t))) return row[k]; } return ""; };
    const recs=[];
    for(const r of rows){
      const sid=String(pick(r,["학번"])).trim(), name=String(pick(r,["이름","성명"])).trim(), birth=normBirth(pick(r,["생년월일","생년","주민","생일"]));
      if(/^\d{5}$/.test(sid)&&name&&/^\d{6}$/.test(birth)) recs.push({sid,name,birth});
    }
    if(!recs.length){ setStatus("학번/이름/생년월일 형식을 인식하지 못했습니다.","err"); return; }
    if(!confirm(`${recs.length}명의 학생 명단을 등록합니다. (이미 전공체험 명단이 있으면 다시 안 올려도 됩니다)`)){ setStatus(""); return; }
    setStatus("등록 중…"); let done=0;
    for(let i=0;i<recs.length;i+=400){
      const chunk=recs.slice(i,i+400); const batch=writeBatch(db);
      for(const rec of chunk){ const vh=await vhashOf(rec.sid,rec.birth); batch.set(doc(db,"students",vh),{ name:rec.name, studentId:rec.sid }); }
      await batch.commit(); done+=chunk.length; setStatus(`등록 중… ${done}/${recs.length}`);
    }
    setStatus(`학생 명단 ${recs.length}명 등록 완료`,"ok");
  }catch(err){ console.error(err); setStatus("명단 가져오기 중 오류가 발생했습니다.","err"); }
  finally{ e.target.value=""; }
});

/* 행 메뉴 / 배정·이동 / 취소 / 이름수정 */
function openRowMenu(vhash){
  const st=students.find(x=>x.vhash===vhash); if(!st) return; rowVhash=vhash;
  const p=parseSid(st.studentId), hasSeat=seats.find(x=>x.vhash===vhash);
  $("rowTitle").textContent=`${st.name} (${p.classNo}반 ${p.studentNo}번)`;
  const cs=$("rowCancelSeat");
  if(hasSeat){ cs.disabled=false; cs.style.opacity="1"; cs.textContent=`신청 취소 (${hasSeat.movieName})`; }
  else { cs.disabled=true; cs.style.opacity=".45"; cs.textContent="신청 취소 (신청 내역 없음)"; }
  $("rowModal").classList.add("show");
}
$("rowClose").addEventListener("click", ()=>$("rowModal").classList.remove("show"));
$("rowEditName").addEventListener("click", ()=>{ $("rowModal").classList.remove("show"); if(rowVhash) editStudentName(rowVhash); });
$("rowCancelSeat").addEventListener("click", ()=>{ if($("rowCancelSeat").disabled) return; $("rowModal").classList.remove("show"); if(rowVhash) teacherCancel(rowVhash); });
$("rowAssign").addEventListener("click", ()=>{ $("rowModal").classList.remove("show"); if(rowVhash) openAssign(rowVhash); });

function openAssign(vhash){
  const st=students.find(x=>x.vhash===vhash); if(!st) return; assignVhash=vhash;
  const p=parseSid(st.studentId), cur=seats.find(x=>x.vhash===vhash);
  $("assignTitle").textContent=`${st.name} (${p.classNo}반) · 영화 배정`;
  $("assignMsg").textContent="";
  const cnt={}; seats.filter(s=>s.classNo===p.classNo).forEach(s=>cnt[s.movieId]=(cnt[s.movieId]||0)+1);
  $("assignList").innerHTML = items.map(m=>{
    const n=cnt[m.id]||0, cap=m.perClass||0, rem=cap-n, full=rem<=0&&!(cur&&cur.movieId===m.id);
    return `<button class="mvopt ${cur&&cur.movieId===m.id?"cur":""}" data-mv="${m.id}">${esc(m.name)}
      <span class="rem ${full?"full":""}">${cur&&cur.movieId===m.id?"현재":`${n}/${cap}`}</span></button>`;
  }).join("") + (cur?`<button class="mvopt" data-mv="__none" style="border-color:var(--danger);color:var(--danger)">신청 취소(미배정)</button>`:"");
  $("assignList").querySelectorAll("[data-mv]").forEach(b=>b.addEventListener("click", ()=>doAssign(assignVhash, b.dataset.mv)));
  $("assignModal").classList.add("show");
}
$("assignClose").addEventListener("click", ()=>$("assignModal").classList.remove("show"));
async function doAssign(vhash, movieId){
  const st=students.find(x=>x.vhash===vhash); if(!st) return;
  const p=parseSid(st.studentId);
  if(movieId==="__none"){ await teacherCancel(vhash, true); $("assignModal").classList.remove("show"); return; }
  const m=items.find(x=>x.id===movieId); if(!m) return;
  try{
    await runTransaction(db, async (tx)=>{
      const seatRef=evDoc("seats",vhash);
      const ss=await tx.get(seatRef);
      const newCntRef=cntDoc(p.classNo,movieId); const ncs=await tx.get(newCntRef); const nn=ncs.exists()?(ncs.data().n||0):0;
      let oldCntRef=null, oldN=0, oldMid=null;
      if(ss.exists()){ oldMid=ss.data().movieId; if(oldMid===movieId) return; oldCntRef=cntDoc(p.classNo,oldMid); const ocs=await tx.get(oldCntRef); oldN=ocs.exists()?(ocs.data().n||0):0; }
      if(oldCntRef) tx.set(oldCntRef,{ n:Math.max(0,oldN-1) });
      tx.set(newCntRef,{ n:nn+1 });
      tx.set(seatRef,{ studentId:st.studentId, name:st.name, classNo:p.classNo, studentNo:p.studentNo, movieId, movieName:m.name, createdAt:serverTimestamp() });
    });
    $("assignMsg").style.color="var(--ok)"; $("assignMsg").textContent=`'${m.name}'로 배정했습니다.`;
    setTimeout(()=>$("assignModal").classList.remove("show"),700);
  }catch(e){ console.error(e); $("assignMsg").style.color="var(--danger)"; $("assignMsg").textContent="배정 중 오류가 발생했습니다."; }
}
async function teacherCancel(vhash, silent){
  const s=seats.find(x=>x.vhash===vhash); if(!s) return;
  if(!silent && !confirm(`${s.name}(${s.classNo}반 ${s.studentNo}번) 학생의 '${s.movieName}' 신청을 취소할까요?`)) return;
  try{ await runTransaction(db, async (tx)=>{
      const cRef=cntDoc(s.classNo,s.movieId); const cs=await tx.get(cRef); if(cs.exists()){ const n=cs.data().n||0; tx.set(cRef,{n:Math.max(0,n-1)}); }
      tx.delete(evDoc("seats",vhash));
    }); }catch(e){ console.error(e); alert("취소 중 오류가 발생했습니다."); }
}
async function editStudentName(vhash){
  const st=students.find(x=>x.vhash===vhash); if(!st) return; const p=parseSid(st.studentId);
  const nv=prompt(`이름 수정 (${p.classNo}반 ${p.studentNo}번)\n새 이름:`, st.name||""); if(nv===null) return;
  const name=nv.trim(); if(!name){ alert("이름은 비울 수 없습니다."); return; } if(name===st.name) return;
  try{
    await setDoc(doc(db,"students",vhash), { name }, { merge:true });
    const hasSeat=seats.find(x=>x.vhash===vhash); if(hasSeat) await setDoc(evDoc("seats",vhash), { name }, { merge:true });
    setStatus(`이름을 '${name}'(으)로 수정했습니다.`,"ok");
  }catch(e){ console.error(e); alert("이름 수정 중 오류가 발생했습니다."); }
}

/* ===== Q&A ===== */
function qnaTimeStr(ts){ try{ const d=ts?.toDate?ts.toDate():null; if(!d) return ""; const p=n=>String(n).padStart(2,"0"); return `${d.getMonth()+1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`; }catch(e){ return ""; } }
function renderQna(){ if(!role) return; try{ _renderQna(); }catch(e){ console.error("qna:",e); } }
function _renderQna(){
  $("qnaCsvBtn").style.display = role==="teacher"?"inline-block":"none";
  const myMovie=(seat&&seat.movieId)||selectedId;
  if(role==="student" && !qnaUserPicked && myMovie) qnaPick=myMovie;
  else if(!qnaPick && items.length) qnaPick=items[0].id;
  const cntOf={}; questions.forEach(q=>cntOf[q.movieId]=(cntOf[q.movieId]||0)+1);
  $("qnaChips").innerHTML = items.map(m=>{
    const c=cntOf[m.id]||0;
    return `<button class="chip ${m.id===qnaPick?"active":""}" data-qna="${m.id}"><span title="${esc(m.name)}">${esc(m.name)}</span>${c?`<span class="qcount">${c}</span>`:""}</button>`;
  }).join("") || `<div class="empty" style="grid-column:1/-1">영화를 먼저 등록해 주세요.</div>`;
  $("qnaChips").querySelectorAll("[data-qna]").forEach(b=>b.addEventListener("click", ()=>{ if(b.dataset.qna!==qnaPick) cancelEdit(); qnaUserPicked=true; qnaPick=b.dataset.qna; renderQna(); }));
  const m=items.find(x=>x.id===qnaPick);
  $("qnaTitle").innerHTML = m?`💬 ${esc(m.name)} Q&amp;A`:"💬 영화 Q&amp;A";
  const list=questions.filter(q=>q.movieId===qnaPick);
  $("qnaMeta").textContent = list.length?`질문 ${list.length}개`:"";
  $("qnaList").innerHTML = list.length ? list.map(q=>{
    const own=me&&q.vhash===me.vhash, acts=[];
    if(own) acts.push(`<button class="qedit" data-edit="${q.id}">수정</button>`);
    if(role==="teacher"||own) acts.push(`<button class="qdel" data-del="${q.id}">삭제</button>`);
    const edited=q.editedAt?` <span class="qedited">(수정됨)</span>`:"";
    return `<div class="qitem${editId===q.id?" editing":""}"><div class="qtop">
      <div class="qline"><span class="qsid">${esc(q.studentId||"")}</span><span class="qname">${esc(q.name||"익명")}</span><span class="qq">${esc(q.text||"")}</span></div>
      <span class="qtime">${qnaTimeStr(q.createdAt)}${edited}${acts.length?" · "+acts.join(" · "):""}</span></div></div>`;
  }).join("") : `<div class="qempty">아직 질문이 없어요. 첫 질문을 남겨보세요!</div>`;
  $("qnaList").querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click", ()=>deleteQuestion(b.dataset.del)));
  $("qnaList").querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click", ()=>startEdit(b.dataset.edit)));
}
function startEdit(id){ const q=questions.find(x=>x.id===id); if(!q) return; editId=id; $("qnaText").value=q.text||""; $("qnaText").focus(); $("qnaPost").textContent="수정 완료"; const msg=$("qnaMsg"); msg.className="qnamsg"; msg.innerHTML=`수정 중… <span class="lnk" id="qnaCancelLnk">취소</span>`; $("qnaCancelLnk")?.addEventListener("click", cancelEdit); renderQna(); }
function cancelEdit(){ editId=null; $("qnaText").value=""; $("qnaPost").textContent="질문 남기기"; const msg=$("qnaMsg"); msg.className="qnamsg"; msg.textContent=""; }
$("qnaPost").addEventListener("click", async ()=>{
  const t=$("qnaText").value.trim(); const msg=$("qnaMsg"); msg.className="qnamsg"; msg.textContent="";
  if(role!=="student"){ msg.classList.add("err"); msg.textContent="질문 작성·수정은 학생만 가능해요. (교사는 보기·삭제만)"; return; }
  if(t.length<2){ msg.classList.add("err"); msg.textContent="질문을 입력해 주세요."; return; }
  $("qnaPost").disabled=true;
  try{
    if(editId){ await setDoc(evDoc("questions",editId), { text:t, editedAt:serverTimestamp() }, { merge:true }); cancelEdit(); msg.classList.add("ok"); msg.textContent="질문이 수정되었어요!"; }
    else {
      if(!qnaPick){ msg.classList.add("err"); msg.textContent="영화를 먼저 선택해 주세요."; return; }
      const m=items.find(x=>x.id===qnaPick);
      await setDoc(doc(questionsCol()), { movieId:qnaPick, movieName:m?m.name:"", text:t, name:me.name, vhash:me.vhash, studentId:me.studentId, classNo:me.classNo, createdAt:serverTimestamp() });
      $("qnaText").value=""; msg.classList.add("ok"); msg.textContent="질문이 등록되었어요!";
    }
    setTimeout(()=>{ if(!editId){ msg.textContent=""; msg.className="qnamsg"; } }, 2500);
  }catch(e){ console.error(e); msg.classList.add("err"); msg.textContent="처리 중 오류가 발생했습니다."; }
  finally{ $("qnaPost").disabled=false; }
});
async function deleteQuestion(id){ const q=questions.find(x=>x.id===id); if(!q) return; if(!confirm(`${q.name||""} 학생의 질문을 삭제할까요?`)) return; try{ if(editId===id) cancelEdit(); await deleteDoc(evDoc("questions",id)); }catch(e){ console.error(e); alert("삭제 중 오류가 발생했습니다."); } }

/* ===== 엑셀 다운로드 ===== */
function ymd(){ return new Date().toISOString().slice(0,10); }
function aoaSheet(aoa){ return XLSX.utils.aoa_to_sheet(aoa); }
function safeName(s){ return String(s||"시트").replace(/[\\/?*\[\]:]/g,"·").slice(0,31); }
function timeStr(ts){ return ts?.toDate ? ts.toDate().toLocaleString("ko-KR") : ""; }
function classRecords(){
  const byV={}; seats.forEach(s=>byV[s.vhash]=s);
  return students.map(st=>{ const p=parseSid(st.studentId); return {studentId:st.studentId||"", classNo:p.classNo, studentNo:p.studentNo, name:st.name, seat:byV[st.vhash]||null}; })
    .sort((a,b)=>(a.classNo-b.classNo)||(a.studentNo-b.studentNo));
}
// 반별 조편성: 통합 + 반별(영화 그룹) 시트
function downloadGroups(){
  const wb=XLSX.utils.book_new(); const recs=classRecords();
  const all=[["반","영화(모둠)","번호","학번","이름"]];
  recs.slice().sort((a,b)=>(a.classNo-b.classNo)||((a.seat?a.seat.movieName:"힣").localeCompare(b.seat?b.seat.movieName:"힣"))||(a.studentNo-b.studentNo))
    .forEach(r=>all.push([r.classNo, r.seat?r.seat.movieName:"(미신청)", r.studentNo, r.studentId, r.name||""]));
  XLSX.utils.book_append_sheet(wb, aoaSheet(all), "전체조편성통합");
  const classNos=[...new Set(recs.map(r=>r.classNo))].sort((a,b)=>a-b);
  classNos.forEach(c=>{
    const aoa=[["영화(모둠)","번호","학번","이름"]];
    items.forEach(m=>{ const list=recs.filter(r=>r.classNo===c && r.seat && r.seat.movieId===m.id).sort((a,b)=>a.studentNo-b.studentNo);
      if(list.length) list.forEach(r=>aoa.push([m.name, r.studentNo, r.studentId, r.name||""])); });
    const none=recs.filter(r=>r.classNo===c && !r.seat); none.forEach(r=>aoa.push(["(미신청)", r.studentNo, r.studentId, r.name||""]));
    if(aoa.length===1) aoa.push(["(신청 없음)","","",""]);
    XLSX.utils.book_append_sheet(wb, aoaSheet(aoa), safeName(`${c}반`));
  });
  XLSX.writeFile(wb, `영화진로_반별조편성_${ymd()}.xlsx`);
}
// 영화별: 통합 + 영화별 시트
function downloadByMovie(){
  const wb=XLSX.utils.book_new();
  const all=[["영화","반","번호","학번","이름","신청시각"]];
  seats.slice().sort((a,b)=>(itemName(a.movieId)||"").localeCompare(itemName(b.movieId)||"")||(a.classNo-b.classNo)||(a.studentNo-b.studentNo))
    .forEach(r=>all.push([r.movieName, r.classNo, r.studentNo, r.studentId||"", r.name||"", timeStr(r.createdAt)]));
  XLSX.utils.book_append_sheet(wb, aoaSheet(all), "전체영화통합");
  items.forEach(m=>{
    const list=seats.filter(s=>s.movieId===m.id).sort((a,b)=>(a.classNo-b.classNo)||(a.studentNo-b.studentNo));
    const aoa=[["반","번호","학번","이름","신청시각"]];
    list.forEach(r=>aoa.push([r.classNo, r.studentNo, r.studentId||"", r.name||"", timeStr(r.createdAt)]));
    if(!list.length) aoa.push(["(신청자 없음)","","","",""]);
    XLSX.utils.book_append_sheet(wb, aoaSheet(aoa), safeName(`${m.ord}.${m.name}`));
  });
  XLSX.writeFile(wb, `영화진로_영화별명단_${ymd()}.xlsx`);
}
// 전교생
function downloadAll(){
  const wb=XLSX.utils.book_new(); const recs=classRecords();
  const all=[["반","번호","학번","이름","신청영화","상태"]];
  recs.forEach(r=>all.push([r.classNo, r.studentNo, r.studentId, r.name||"", r.seat?r.seat.movieName:"", r.seat?"신청완료":"미신청"]));
  XLSX.utils.book_append_sheet(wb, aoaSheet(all), "전교생통합");
  const classNos=[...new Set(recs.map(r=>r.classNo))].sort((a,b)=>a-b);
  classNos.forEach(c=>{ const aoa=[["번호","학번","이름","신청영화","상태"]];
    recs.filter(r=>r.classNo===c).forEach(r=>aoa.push([r.studentNo, r.studentId, r.name||"", r.seat?r.seat.movieName:"", r.seat?"신청완료":"미신청"]));
    XLSX.utils.book_append_sheet(wb, aoaSheet(aoa), safeName(`${c}반`)); });
  XLSX.writeFile(wb, `영화진로_전교생명단_${ymd()}.xlsx`);
}
function downloadQna(){
  const wb=XLSX.utils.book_new();
  const ordOf={}; items.forEach(m=>ordOf[m.id]=m.ord);
  const sorted=questions.slice().sort((a,b)=>((ordOf[a.movieId]||0)-(ordOf[b.movieId]||0))||((a.createdAt?.seconds||0)-(b.createdAt?.seconds||0)));
  const all=[["영화","학번","이름","질문","작성시각","수정됨"]];
  sorted.forEach(q=>all.push([q.movieName||"", q.studentId||"", q.name||"", q.text||"", timeStr(q.createdAt), q.editedAt?"수정됨":""]));
  XLSX.utils.book_append_sheet(wb, aoaSheet(all), "모든영화질문");
  items.forEach(m=>{ const list=sorted.filter(q=>q.movieId===m.id); const aoa=[["학번","이름","질문","작성시각","수정됨"]];
    list.forEach(q=>aoa.push([q.studentId||"", q.name||"", q.text||"", timeStr(q.createdAt), q.editedAt?"수정됨":""]));
    if(!list.length) aoa.push(["(질문 없음)","","","",""]); XLSX.utils.book_append_sheet(wb, aoaSheet(aoa), safeName(`${m.ord}.${m.name}`)); });
  XLSX.writeFile(wb, `영화진로_QnA_${ymd()}.xlsx`);
}
$("csvBtn").addEventListener("click", ()=>{ if(mgTab==="groups") downloadGroups(); else if(mgTab==="all") downloadAll(); else downloadByMovie(); });
$("qnaCsvBtn")?.addEventListener("click", downloadQna);
</script>
