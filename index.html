<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전공체험 학과 신청</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --ink:#26231c; --body:#4a463d; --muted:#9b958a; --line2:#e7e3d8;
    --yellow:#ffd84d; --yellow-d:#f5c518; --yellow-soft:#fff7d6; --band:#fff2bf;
    --ok:#2f8f6a; --ok-soft:#e9f6ef; --danger:#dd5a4e; --surface:#fff; --page:#fffdf7;
    --shadow:0 2px 4px rgba(60,52,30,.04), 0 8px 22px rgba(80,68,30,.07);
    --radius:18px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --ink:#f3efe6; --body:#d8d3c8; --muted:#9a948a; --line2:#3a372f;
      --yellow:#ffd84d; --yellow-d:#ffe06b; --yellow-soft:#3a3320; --band:#2a2718;
      --ok:#5fcfa3; --ok-soft:#1e3a30; --danger:#ff8a7d; --surface:#26241e; --page:#1b1a15;
      --shadow:0 2px 4px rgba(0,0,0,.2), 0 8px 22px rgba(0,0,0,.3);
    }
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Pretendard","Apple SD Gothic Neo",system-ui,sans-serif; color:var(--body);
        font-size:16px; line-height:1.62; background:var(--page); -webkit-font-smoothing:antialiased; }
  .display{ font-family:"Gmarket Sans","Pretendard",sans-serif; }

  .band{ background:linear-gradient(180deg,var(--band) 0%, var(--page) 100%); }
  .band .inner{ max-width:560px; transition:max-width .2s; margin:0 auto; padding:28px 20px 26px; text-align:center; }
  .badge{ display:inline-block; background:var(--surface); color:var(--yellow-d); font-weight:700; font-size:.8rem;
          padding:6px 14px; border-radius:999px; box-shadow:var(--shadow); }
  @media (prefers-color-scheme: dark){ .badge{ color:#ffe06b; } }
  .band h1{ font-size:2rem; color:var(--ink); margin:14px 0 6px; letter-spacing:-.01em; }
  .band .tag{ color:var(--muted); font-size:.95rem; font-weight:500; }
  .band .tag b{ color:var(--body); }

  .wrap{ max-width:560px; margin:0 auto; padding:8px 20px 72px; transition:max-width .2s; }
  .wrap.wide{ max-width:1140px; }
  .band .inner.wide{ max-width:1140px; }

  .intro{ background:var(--surface); border:1px solid var(--line2); border-radius:var(--radius); padding:16px 20px; margin-bottom:18px; box-shadow:var(--shadow); }
  .intro ul{ margin:0; padding-left:2px; list-style:none; }
  .intro li{ font-size:.93rem; color:var(--body); margin:6px 0; padding-left:22px; position:relative; }
  .intro li::before{ content:""; position:absolute; left:2px; top:.62em; width:7px; height:7px; border-radius:50%; background:var(--yellow-d); }
  .intro li b{ color:var(--ink); font-weight:700; }

  .card{ background:var(--surface); border:1px solid var(--line2); border-radius:var(--radius); padding:24px 22px; margin-bottom:16px; box-shadow:var(--shadow); }
  .card h2{ margin:0 0 4px; font-size:1.12rem; font-weight:700; color:var(--ink); }
  .card .sub{ color:var(--muted); font-size:.88rem; margin:0 0 16px; }
  label{ display:block; font-size:.84rem; font-weight:600; margin:14px 0 6px; color:var(--body); }
  input{ width:100%; padding:13px 15px; border:1.5px solid var(--line2); border-radius:12px; font-size:1rem;
         color:var(--ink); background:var(--page); transition:.15s; }
  input::placeholder{ color:var(--muted); }
  input:focus{ outline:none; border-color:var(--yellow-d); background:var(--surface); box-shadow:0 0 0 3px rgba(245,197,24,.25); }
  button{ width:100%; margin-top:20px; padding:15px; border:none; border-radius:13px; font-size:1.05rem;
          font-weight:700; cursor:pointer; transition:.15s; background:var(--yellow); color:#3a3320;
          box-shadow:0 4px 14px rgba(245,197,24,.35); }
  button:hover{ background:var(--yellow-d); }
  button:active{ transform:translateY(1px); }
  button.sub2{ background:var(--surface); color:var(--body); border:1.5px solid var(--line2); box-shadow:none; font-weight:600; }
  button.danger{ background:var(--surface); color:var(--danger); border:1.5px solid var(--danger); box-shadow:none; }
  button:disabled{ background:var(--line2); color:var(--muted); box-shadow:none; cursor:not-allowed; }
  .msg{ margin-top:16px; padding:13px 15px; border-radius:12px; font-size:.93rem; font-weight:600; display:none; }
  .msg.show{ display:block; }
  .msg.success{ background:var(--ok-soft); color:var(--ok); }
  .msg.error{ background:var(--yellow-soft); color:var(--danger); }
  .msg.info{ background:var(--yellow-soft); color:var(--ink); }

  .hello{ font-size:1.15rem; font-weight:700; color:var(--ink); margin-bottom:16px; }
  .hello .small{ font-size:.85rem; font-weight:500; color:var(--muted); margin-left:6px; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(158px,1fr)); gap:9px; }
  .blk{ position:relative; text-align:left; background:var(--surface); border:1.5px solid var(--line2); border-radius:13px;
        padding:11px 12px; cursor:pointer; transition:.14s; }
  .blk:hover{ border-color:var(--yellow-d); transform:translateY(-2px); box-shadow:var(--shadow); }
  .blk .nm{ font-weight:700; color:var(--ink); font-size:.97rem; line-height:1.3; }
  .blk .dt{ font-size:.79rem; color:var(--muted); margin-top:3px; line-height:1.4;
        display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; min-height:2.2em; }
  .blk .bartrack{ height:5px; background:var(--line2); border-radius:5px; overflow:hidden; margin-top:8px; }
  .blk .barfill{ height:100%; background:var(--yellow-d); border-radius:5px; transition:width .3s; }
  .blk .seat{ margin-top:6px; font-size:.82rem; font-weight:700; color:var(--ok); }
  .blk.selected{ border-color:var(--yellow-d); background:var(--yellow-soft); box-shadow:0 0 0 2.5px rgba(245,197,24,.35); }
  .blk.selected .nm::after{ content:"✓"; display:inline-grid; place-items:center; width:18px; height:18px; margin-left:7px;
        background:var(--yellow-d); color:#5a4d20; border-radius:50%; font-size:.7rem; font-weight:800; vertical-align:middle; }
  .blk.full{ opacity:.5; cursor:not-allowed; }
  .blk.full:hover{ border-color:var(--line2); transform:none; box-shadow:none; }
  .blk.full .seat{ color:var(--danger); }
  .blk.mine{ border-color:var(--ok); background:var(--ok-soft); }
  .blk.mine .nm::after{ content:"신청함"; margin-left:7px; font-size:.72rem; font-weight:700; color:#fff;
        background:var(--ok); padding:2px 8px; border-radius:999px; vertical-align:middle; }
  .blk.locked{ cursor:default; }
  .blk.locked:not(.mine):hover{ border-color:var(--line2); transform:none; box-shadow:none; }
  .current{ background:var(--ok-soft); border:1.5px solid var(--ok); border-radius:15px; padding:16px 18px; margin-bottom:14px; }
  .current .lab{ font-size:.82rem; color:var(--ok); font-weight:600; }
  .current .val{ font-size:1.3rem; font-weight:700; color:var(--ok); margin-top:2px; }
  .loading{ text-align:center; color:var(--muted); padding:26px 0; }
  .hidden{ display:none; }
  @media (max-width:480px){ .band h1{ font-size:1.6rem; } .grid{ grid-template-columns:repeat(2,1fr); gap:8px; } .wrap{ padding-left:14px; padding-right:14px; } }
</style>
</head>
<body>
<div class="band">
  <div class="inner" id="bandInner">
    <span class="badge">🎓 선문대 전공체험</span>
    <h1 class="display">전공체험 학과 신청</h1>
    <div class="tag"><b>7/14(화) 4~5교시</b> · 1학년 교실</div>
  </div>
</div>

<div class="wrap" id="wrap">
  <div class="intro">
    <ul>
      <li>희망 학과 <b>1곳</b>을 골라 2시간 동안 전공 활동에 참여해요</li>
      <li>학과당 <b>선착순 36명</b>, 정원이 차면 선택할 수 없어요</li>
      <li>취소 후 재신청 가능 <b>(가려는 학과에 자리가 남아 있을 때만)</b></li>
    </ul>
  </div>

  <div class="card" id="authCard">
    <h2>본인 확인</h2>
    <p class="sub">학번과 생년월일로 본인을 확인합니다.</p>
    <label for="sid">학번 (5자리)</label>
    <input id="sid" inputmode="numeric" maxlength="5" placeholder="예) 10101" />
    <label for="birth">생년월일 6자리</label>
    <input id="birth" inputmode="numeric" maxlength="6" placeholder="예) 100101" />
    <button id="verifyBtn" disabled>확인</button>
    <div class="msg" id="authMsg"></div>
  </div>

  <div class="card hidden" id="mainCard">
    <div class="hello" id="hello"></div>
    <div id="statusArea"></div>
    <div class="grid" id="grid"><div class="loading">학과 현황 불러오는 중…</div></div>
    <button id="applyBtn" class="hidden" disabled>신청하기</button>
    <div class="msg" id="mainMsg"></div>
    <button id="cancelBtn" class="danger hidden" style="margin-top:10px;">신청 취소하고 다시 선택</button>
    <button class="sub2" id="logoutBtn" style="margin-top:14px;">로그아웃</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, doc, getDoc, query, orderBy,
  onSnapshot, runTransaction, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBHlhwEiE8PyX4Voy1xsS3PZkSMIZ1nos0",
  authDomain: "project-8873314123491726167.firebaseapp.com",
  projectId: "project-8873314123491726167",
  storageBucket: "project-8873314123491726167.firebasestorage.app",
  messagingSenderId: "651427691407",
  appId: "1:651427691407:web:2c7530ff9b8035428469fa",
  measurementId: "G-FTNE1QRPN7",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const $ = (id) => document.getElementById(id);

let depts = [], me = null, seat = null, selectedId = null, unsubSeat = null;

async function sha256Hex(str){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }
const normBirth = (s)=>String(s).replace(/\D/g,"").padStart(6,"0").slice(-6);
const vhashOf = (sid,birth)=>sha256Hex(`${String(sid).trim()}|${normBirth(birth)}`);
const parseSid = (sid)=>{ const s=String(sid); return { classNo:+s.slice(1,3), studentNo:+s.slice(3,5) }; };
function showMsg(el,t,type){ el.textContent=t; el.className="msg show "+type; }
function clearMsg(el){ el.className="msg"; }

onSnapshot(query(collection(db,"departments"),orderBy("ord")), (snap)=>{
  depts = snap.docs.map(d=>({id:d.id,...d.data()}));
  if (me) renderGrid();
});

function renderGrid(){
  const locked = !!seat;
  $("grid").innerHTML = depts.map(d=>{
    const rem = d.capacity - d.filled, full = rem<=0;
    const pct = d.capacity ? Math.round(d.filled/d.capacity*100) : 0;
    const isMine = seat && seat.deptId===d.id;
    const isSel = !locked && selectedId===d.id;
    let cls = "blk";
    if (isMine) cls += " mine locked";
    else if (locked) cls += " locked";
    else if (full) cls += " full";
    else if (isSel) cls += " selected";
    const seatTxt = full && !isMine ? "마감" : `잔여 ${rem}석`;
    return `<div class="${cls}" data-id="${d.id}" ${(!locked&&!full)?'role="button"':''}>
      <div class="nm">${d.name}</div>
      <div class="dt">${d.detail||""}</div>
      <div class="bartrack"><div class="barfill" style="width:${pct}%"></div></div>
      <div class="seat">${seatTxt}</div>
    </div>`;
  }).join("");
  if (!locked) {
    $("grid").querySelectorAll(".blk:not(.full)").forEach(el=>{
      el.addEventListener("click", ()=>{ selectedId=el.dataset.id; renderGrid(); $("applyBtn").disabled=false; });
    });
  }
}

function renderStatus(){
  const area = $("statusArea");
  if (seat) {
    area.innerHTML = `<div class="current">
        <div class="lab">현재 신청한 학과</div>
        <div class="val">${seat.deptName}</div>
      </div>`;
    $("applyBtn").classList.add("hidden");
    $("cancelBtn").classList.remove("hidden");
  } else {
    area.innerHTML = "";
    $("applyBtn").classList.remove("hidden");
    $("applyBtn").disabled = !selectedId;
    $("cancelBtn").classList.add("hidden");
  }
  renderGrid();
}
$("cancelBtn").addEventListener("click", doCancel);

$("verifyBtn").addEventListener("click", async ()=>{
  clearMsg($("authMsg"));
  const sid=$("sid").value.trim(), birth=$("birth").value.trim();
  if(!/^\d{5}$/.test(sid)) return showMsg($("authMsg"),"학번은 5자리 숫자로 입력해 주세요.","error");
  if(!/^\d{6}$/.test(birth)) return showMsg($("authMsg"),"생년월일은 6자리 숫자로 입력해 주세요.","error");
  $("verifyBtn").disabled=true; $("verifyBtn").textContent="확인 중…";
  try {
    const vh = await vhashOf(sid,birth);
    const snap = await getDoc(doc(db,"students",vh));
    if(!snap.exists()){ showMsg($("authMsg"),"학번 또는 생년월일이 일치하지 않습니다. 다시 확인해 주세요.","error"); return; }
    me = { studentId:sid, vhash:vh, name:snap.data().name, ...parseSid(sid) };
    $("hello").innerHTML = `${me.name} 학생, 환영합니다 <span class="small">${me.classNo}반 ${me.studentNo}번</span>`;
    $("authCard").classList.add("hidden");
    $("mainCard").classList.remove("hidden");
    $("wrap").classList.add("wide"); $("bandInner").classList.add("wide");
    renderStatus();
    subscribeSeat();
  } catch(e){ console.error(e); showMsg($("authMsg"),"확인 중 오류가 발생했습니다. 새로고침 후 다시 시도해 주세요.","error"); }
  finally { $("verifyBtn").disabled=false; $("verifyBtn").textContent="확인"; }
});

function subscribeSeat(){
  if(unsubSeat) unsubSeat();
  unsubSeat = onSnapshot(doc(db,"seats",me.vhash), (s)=>{
    seat = s.exists()? s.data() : null;
    if (seat) selectedId = null;
    renderStatus();
  });
}

$("applyBtn").addEventListener("click", async ()=>{
  clearMsg($("mainMsg"));
  if(!selectedId) return showMsg($("mainMsg"),"신청할 학과를 선택해 주세요.","error");
  $("applyBtn").disabled=true; $("applyBtn").textContent="신청 중…";
  try {
    const result = await runTransaction(db, async (tx)=>{
      const seatRef=doc(db,"seats",me.vhash), deptRef=doc(db,"departments",selectedId);
      const seatSnap=await tx.get(seatRef);
      if(seatSnap.exists()) return {status:"HAS", deptName:seatSnap.data().deptName};
      const deptSnap=await tx.get(deptRef);
      if(!deptSnap.exists()) return {status:"ERROR"};
      const d=deptSnap.data();
      if(d.filled>=d.capacity) return {status:"FULL", deptName:d.name};
      tx.set(seatRef,{ studentId:me.studentId, name:me.name, classNo:me.classNo, studentNo:me.studentNo,
        deptId:selectedId, deptName:d.name, createdAt:serverTimestamp() });
      tx.update(deptRef,{ filled:d.filled+1 });
      return {status:"OK", deptName:d.name};
    });
    if(result.status==="OK") showMsg($("mainMsg"),`🎉 '${result.deptName}' 신청이 완료되었습니다!`,"success");
    else if(result.status==="FULL") showMsg($("mainMsg"),`방금 '${result.deptName}'가 마감되었습니다. 다른 학과를 선택해 주세요.`,"error");
    else if(result.status==="HAS") showMsg($("mainMsg"),`이미 '${result.deptName}'에 신청되어 있습니다.`,"info");
    else showMsg($("mainMsg"),"학과 정보를 찾을 수 없습니다. 새로고침 후 다시 시도해 주세요.","error");
  } catch(e){ console.error(e); showMsg($("mainMsg"),"신청 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.","error"); }
  finally { $("applyBtn").textContent="신청하기"; }
});

async function doCancel(){
  if(!confirm("신청을 취소할까요? 취소 후 다른 학과를 다시 선택할 수 있습니다.")) return;
  clearMsg($("mainMsg"));
  try {
    await runTransaction(db, async (tx)=>{
      const seatRef=doc(db,"seats",me.vhash);
      const seatSnap=await tx.get(seatRef);
      if(!seatSnap.exists()) return;
      const deptId=seatSnap.data().deptId, deptRef=doc(db,"departments",deptId);
      const deptSnap=await tx.get(deptRef);
      const cur=deptSnap.exists()?deptSnap.data().filled:0;
      tx.update(deptRef,{ filled:Math.max(0,cur-1) });
      tx.delete(seatRef);
    });
    showMsg($("mainMsg"),"신청이 취소되었습니다. 원하는 학과를 다시 선택해 주세요.","info");
  } catch(e){ console.error(e); showMsg($("mainMsg"),"취소 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.","error"); }
}

$("logoutBtn").addEventListener("click", ()=>{
  if(unsubSeat){ unsubSeat(); unsubSeat=null; }
  me=null; seat=null; selectedId=null;
  $("sid").value=""; $("birth").value="";
  clearMsg($("authMsg")); clearMsg($("mainMsg"));
  const cw=$("cancelBtn"); if(cw) cw.classList.add("hidden");
  $("mainCard").classList.add("hidden");
  $("authCard").classList.remove("hidden");
  $("wrap").classList.remove("wide"); $("bandInner").classList.remove("wide");
});

signInAnonymously(auth)
  .then(()=>{ $("verifyBtn").disabled=false; })
  .catch((e)=>{ console.error(e); showMsg($("authMsg"),"연결에 실패했습니다. 새로고침 해 주세요.","error"); });
</script>
</body>
</html>
