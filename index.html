<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1학년 전공체험 학과 신청</title>
<style>
  :root { --navy:#2b3a67; --blue:#3d6cb9; --bg:#f4f6fb; --green:#1a9c5b; --red:#d23d3d; --line:#e2e6ef; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
         background:var(--bg); color:#1f2533; line-height:1.55; }
  .wrap { max-width:640px; margin:0 auto; padding:18px 16px 60px; }
  header { text-align:center; padding:18px 0 10px; }
  header h1 { font-size:1.35rem; margin:0 0 6px; color:var(--navy); }
  header .sub { color:#5a6478; font-size:.9rem; }
  .notice { background:#fff; border:1px solid var(--line); border-left:4px solid var(--blue);
            border-radius:10px; padding:14px 16px; margin:14px 0; font-size:.92rem; }
  .notice b { color:var(--navy); }
  .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:18px 16px; margin-bottom:16px; }
  .card h2 { margin:0 0 14px; font-size:1.05rem; color:var(--navy); }
  label { display:block; font-size:.85rem; font-weight:600; margin:12px 0 5px; color:#3a4256; }
  input, select { width:100%; padding:12px; border:1px solid #cfd5e2; border-radius:9px; font-size:1rem; background:#fff; color:#1f2533; }
  input:focus, select:focus { outline:none; border-color:var(--blue); }
  button { width:100%; margin-top:18px; padding:14px; border:none; border-radius:10px;
           background:var(--blue); color:#fff; font-size:1.05rem; font-weight:700; cursor:pointer; }
  button.sub2 { background:#fff; color:var(--navy); border:1px solid #cfd5e2; }
  button.danger { background:#fff; color:var(--red); border:1px solid #f1c4c4; }
  button:disabled { background:#aab4c8; cursor:not-allowed; color:#fff; }
  .msg { margin-top:14px; padding:13px 14px; border-radius:9px; font-size:.95rem; display:none; }
  .msg.show { display:block; }
  .msg.success { background:#e7f6ee; color:var(--green); border:1px solid #b8e6cd; }
  .msg.error { background:#fbe9e9; color:var(--red); border:1px solid #f1c4c4; }
  .msg.info { background:#eef3fb; color:var(--navy); border:1px solid #cfdcf2; }
  .hello { font-size:1.05rem; color:var(--navy); }
  .hello b { font-size:1.2rem; }
  .total { text-align:center; font-size:.9rem; color:#5a6478; margin:4px 0 12px; }
  .total b { color:var(--navy); }
  .list { display:flex; flex-direction:column; gap:8px; margin-bottom:6px; }
  .dept { display:flex; align-items:center; justify-content:space-between; gap:10px;
          background:#fff; border:1px solid var(--line); border-radius:10px; padding:11px 14px; }
  .dept.full { opacity:.55; background:#f7f8fa; }
  .dept .nm { font-weight:700; color:var(--navy); }
  .dept .dt { font-size:.82rem; color:#6b7280; margin-top:2px; }
  .badge { flex:none; font-size:.82rem; font-weight:700; padding:5px 10px; border-radius:999px; white-space:nowrap; }
  .badge.ok { background:#e7f6ee; color:var(--green); }
  .badge.full { background:#fbe9e9; color:var(--red); }
  .current { background:#eef3fb; border:1px solid #cfdcf2; border-radius:10px; padding:14px 16px; }
  .current .lab { font-size:.85rem; color:#5a6478; }
  .current .val { font-size:1.15rem; font-weight:800; color:var(--navy); margin-top:2px; }
  .loading { text-align:center; color:#8a93a6; padding:24px 0; }
  .hidden { display:none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎓 2026 1학년 대학연계 전공체험 학과 신청</h1>
    <div class="sub">선문대 전공체험 · 2026. 7. 14.(화) 4~5교시 · 1학년 교실</div>
  </header>

  <div class="notice">
    고사 이후 <b>희망 학과 1곳</b>을 선택해 2시간 동안 전공을 체험하는 프로그램입니다.<br />
    · 한 학과당 <b>선착순 36명</b>으로 마감되며, 정원이 차면 선택할 수 없습니다.<br />
    · 신청 후 마음이 바뀌면 <b>취소하고 다시 신청</b>할 수 있어요. (단, 다른 학과에 자리가 있을 때)
  </div>

  <!-- 1단계: 본인 확인 -->
  <div class="card" id="authCard">
    <h2>본인 확인</h2>
    <label for="sid">학번 (5자리)</label>
    <input id="sid" inputmode="numeric" maxlength="5" placeholder="예) 10325" />
    <label for="birth">생년월일 6자리 (예: 100209)</label>
    <input id="birth" inputmode="numeric" maxlength="6" placeholder="주민등록번호 앞 6자리" />
    <button id="verifyBtn" disabled>확인</button>
    <div class="msg" id="authMsg"></div>
  </div>

  <!-- 2단계: 신청 -->
  <div class="card hidden" id="mainCard">
    <div class="hello" id="hello"></div>
    <div class="total" id="total"></div>

    <div id="statusArea"></div>

    <div id="pickArea">
      <div class="list" id="list"><div class="loading">학과 현황 불러오는 중…</div></div>
      <label for="dept">희망 학과 선택</label>
      <select id="dept"><option>불러오는 중…</option></select>
      <button id="applyBtn">신청하기</button>
    </div>

    <div class="msg" id="mainMsg"></div>
    <button class="sub2" id="logoutBtn" style="margin-top:22px;">다른 학생으로 전환</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
  getFirestore, collection, doc, getDoc, query, orderBy,
  onSnapshot, runTransaction, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ===== Firebase 설정: 콘솔의 웹앱 구성값을 붙여넣으세요 (admin.html과 동일하게) ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBHLhwEiE8PyX4Voy1xsS3PZksSMIZ1nos0",
  authDomain: "project-8873314123491726167.firebaseapp.com",
  projectId: "project-8873314123491726167",
  storageBucket: "project-8873314123491726167.firebasestorage.app",
  messagingSenderId: "651427691407",
  appId: "1:651427691407:web:2c7530ff9b8035428469fa",
  measurementId: "G-FTNE1QRPN7",
};
/* ================================================================================= */

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const $ = (id) => document.getElementById(id);

let authReady = false, depts = [], me = null, seat = null, unsubSeat = null;

/* --- 공통 유틸 --- */
async function sha256Hex(str) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, "0")).join("");
}
const normBirth = (s) => String(s).replace(/\D/g, "").padStart(6, "0").slice(-6);
const vhashOf = (sid, birth) => sha256Hex(`${String(sid).trim()}|${normBirth(birth)}`);
function parseSid(sid) {
  const s = String(sid);
  return { classNo: +s.slice(1, 3), studentNo: +s.slice(3, 5) };
}
function showMsg(el, text, type) { el.textContent = text; el.className = "msg show " + type; }
function clearMsg(el) { el.className = "msg"; }

/* --- 실시간 학과 현황 --- */
onSnapshot(query(collection(db, "departments"), orderBy("ord")), (snap) => {
  depts = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
  renderDepts();
});

function renderDepts() {
  if (!me) return;
  const totalRem = depts.reduce((s, d) => s + Math.max(0, d.capacity - d.filled), 0);
  const totalCnt = depts.reduce((s, d) => s + d.filled, 0);
  $("total").innerHTML = `현재 신청 <b>${totalCnt}명</b> · 전체 잔여 <b>${totalRem}석</b>`;

  $("list").innerHTML = depts.map((d) => {
    const rem = d.capacity - d.filled, full = rem <= 0;
    return `<div class="dept ${full ? "full" : ""}">
      <div><div class="nm">${d.name}</div><div class="dt">${d.detail || ""}</div></div>
      <div class="badge ${full ? "full" : "ok"}">${full ? "마감" : "잔여 " + rem + "석"}</div></div>`;
  }).join("");

  const sel = $("dept"), prev = sel.value;
  const avail = depts.filter((d) => d.capacity - d.filled > 0);
  sel.innerHTML = avail.length
    ? avail.map((d) => `<option value="${d.id}">${d.name} (잔여 ${d.capacity - d.filled}석)</option>`).join("")
    : '<option value="">모든 학과가 마감되었습니다</option>';
  if (avail.some((d) => d.id === prev)) sel.value = prev;
  $("applyBtn").disabled = !avail.length;
}

/* --- 본인 확인 --- */
$("verifyBtn").addEventListener("click", async () => {
  clearMsg($("authMsg"));
  const sid = $("sid").value.trim(), birth = $("birth").value.trim();
  if (!/^\d{5}$/.test(sid)) return showMsg($("authMsg"), "학번은 5자리 숫자로 입력해 주세요.", "error");
  if (!/^\d{6}$/.test(birth)) return showMsg($("authMsg"), "생년월일은 6자리 숫자로 입력해 주세요.", "error");

  $("verifyBtn").disabled = true; $("verifyBtn").textContent = "확인 중…";
  try {
    const vh = await vhashOf(sid, birth);
    const snap = await getDoc(doc(db, "students", vh));
    if (!snap.exists()) {
      showMsg($("authMsg"), "학번 또는 생년월일이 일치하지 않습니다. 다시 확인해 주세요.", "error");
      return;
    }
    me = { studentId: sid, vhash: vh, name: snap.data().name, ...parseSid(sid) };
    $("hello").innerHTML = `<b>${me.name}</b> 학생, 환영합니다! (${me.classNo}반 ${me.studentNo}번)`;
    $("authCard").classList.add("hidden");
    $("mainCard").classList.remove("hidden");
    renderDepts();
    subscribeSeat();
  } catch (e) {
    console.error(e);
    showMsg($("authMsg"), "확인 중 오류가 발생했습니다. 새로고침 후 다시 시도해 주세요.", "error");
  } finally {
    $("verifyBtn").disabled = false; $("verifyBtn").textContent = "확인";
  }
});

/* --- 내 신청 상태 실시간 --- */
function subscribeSeat() {
  if (unsubSeat) unsubSeat();
  unsubSeat = onSnapshot(doc(db, "seats", me.vhash), (s) => {
    seat = s.exists() ? s.data() : null;
    renderStatus();
  });
}

function renderStatus() {
  const area = $("statusArea"), pick = $("pickArea");
  if (seat) {
    area.innerHTML = `<div class="current">
        <div class="lab">현재 신청한 학과</div>
        <div class="val">${seat.deptName}</div>
      </div>
      <button class="danger" id="cancelBtn">신청 취소하고 다시 선택하기</button>`;
    pick.classList.add("hidden");
    $("cancelBtn").addEventListener("click", doCancel);
  } else {
    area.innerHTML = "";
    pick.classList.remove("hidden");
  }
}

/* --- 신청 --- */
$("applyBtn").addEventListener("click", async () => {
  clearMsg($("mainMsg"));
  const deptId = $("dept").value;
  if (!deptId) return showMsg($("mainMsg"), "선택 가능한 학과가 없습니다.", "error");

  $("applyBtn").disabled = true; $("applyBtn").textContent = "신청 중…";
  try {
    const result = await runTransaction(db, async (tx) => {
      const seatRef = doc(db, "seats", me.vhash);
      const deptRef = doc(db, "departments", deptId);
      const seatSnap = await tx.get(seatRef);
      if (seatSnap.exists()) return { status: "HAS", deptName: seatSnap.data().deptName };
      const deptSnap = await tx.get(deptRef);
      if (!deptSnap.exists()) return { status: "ERROR" };
      const d = deptSnap.data();
      if (d.filled >= d.capacity) return { status: "FULL", deptName: d.name };
      tx.set(seatRef, {
        studentId: me.studentId, name: me.name, classNo: me.classNo, studentNo: me.studentNo,
        deptId, deptName: d.name, createdAt: serverTimestamp(),
      });
      tx.update(deptRef, { filled: d.filled + 1 });
      return { status: "OK", deptName: d.name };
    });

    if (result.status === "OK") showMsg($("mainMsg"), `🎉 '${result.deptName}' 신청이 완료되었습니다!`, "success");
    else if (result.status === "FULL") showMsg($("mainMsg"), `방금 '${result.deptName}'가 마감되었습니다. 다른 학과를 선택해 주세요.`, "error");
    else if (result.status === "HAS") showMsg($("mainMsg"), `이미 '${result.deptName}'에 신청되어 있습니다. 변경하려면 먼저 취소해 주세요.`, "info");
    else showMsg($("mainMsg"), "학과 정보를 찾을 수 없습니다. 새로고침 후 다시 시도해 주세요.", "error");
  } catch (e) {
    console.error(e);
    showMsg($("mainMsg"), "신청 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.", "error");
  } finally {
    $("applyBtn").textContent = "신청하기"; renderDepts();
  }
});

/* --- 취소 --- */
async function doCancel() {
  if (!confirm("신청을 취소할까요? 취소 후 다른 학과를 다시 선택할 수 있습니다.")) return;
  clearMsg($("mainMsg"));
  try {
    await runTransaction(db, async (tx) => {
      const seatRef = doc(db, "seats", me.vhash);
      const seatSnap = await tx.get(seatRef);
      if (!seatSnap.exists()) return;
      const deptId = seatSnap.data().deptId;
      const deptRef = doc(db, "departments", deptId);
      const deptSnap = await tx.get(deptRef);
      const cur = deptSnap.exists() ? deptSnap.data().filled : 0;
      tx.update(deptRef, { filled: Math.max(0, cur - 1) });
      tx.delete(seatRef);
    });
    showMsg($("mainMsg"), "신청이 취소되었습니다. 원하는 학과를 다시 선택해 주세요.", "info");
  } catch (e) {
    console.error(e);
    showMsg($("mainMsg"), "취소 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.", "error");
  }
}

/* --- 다른 학생으로 전환 --- */
$("logoutBtn").addEventListener("click", () => {
  if (unsubSeat) { unsubSeat(); unsubSeat = null; }
  me = null; seat = null;
  $("sid").value = ""; $("birth").value = "";
  clearMsg($("authMsg")); clearMsg($("mainMsg"));
  $("mainCard").classList.add("hidden");
  $("authCard").classList.remove("hidden");
});

/* --- 익명 로그인 --- */
signInAnonymously(auth)
  .then(() => { authReady = true; $("verifyBtn").disabled = false; })
  .catch((e) => { console.error(e); showMsg($("authMsg"), "연결에 실패했습니다. 새로고침 해 주세요.", "error"); });
</script>
</body>
</html>
