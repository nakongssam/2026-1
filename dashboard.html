<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>전공체험 신청 현황판</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --ink:#2a2c3a; --body:#4c4f63; --muted:#9094a8; --line:#eceaf6; --line2:#e4e2f2;
    --lav:#7c7fe0; --lav-soft:#edecfb; --sky:#4aa3e0; --sky-soft:#e7f2fc;
    --mint:#3fb491; --mint-soft:#e6f6f0; --peach:#f0915e; --peach-soft:#fdeee4;
    --rose:#e06a96; --rose-soft:#fbeaf1; --danger:#e0556b;
    --surface:#fff; --page:#f6f7fd;
    --shadow:0 1px 2px rgba(60,55,110,.04), 0 8px 24px rgba(70,64,130,.07);
    --r:18px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --ink:#eceaf6; --body:#c8c6da; --muted:#8e90a6; --line:#322f44; --line2:#3a3750;
      --lav:#9a9cf0; --lav-soft:#2c2942; --sky:#6fb6ef; --sky-soft:#1f2c3e;
      --mint:#5fcfa9; --mint-soft:#1d3530; --peach:#f0a47a; --peach-soft:#3a2a1e;
      --rose:#ef8fb3; --rose-soft:#3a2230; --danger:#ff8a7d;
      --surface:#222230; --page:#16161f;
      --shadow:0 1px 2px rgba(0,0,0,.2), 0 8px 24px rgba(0,0,0,.35);
    }
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:"Pretendard","Apple SD Gothic Neo",system-ui,sans-serif; color:var(--body);
        font-size:15.5px; line-height:1.55; background:var(--page); -webkit-font-smoothing:antialiased; }
  .display{ font-family:"Gmarket Sans","Pretendard",sans-serif; }
  .wrap{ max-width:1180px; margin:0 auto; padding:22px 22px 60px; }

  /* 본인 확인 / 로그인 게이트 */
  .gate{ max-width:400px; margin:54px auto; background:var(--surface); border:1px solid var(--line2);
         border-radius:var(--r); padding:26px 24px; box-shadow:var(--shadow); }
  .gate h2{ margin:0 0 4px; font-size:1.2rem; color:var(--ink); }
  .gate .hint{ color:var(--muted); font-size:.86rem; margin:0 0 14px; }
  .seg{ display:flex; gap:4px; background:var(--lav-soft); padding:4px; border-radius:12px; margin-bottom:6px; }
  .seg button{ flex:1; padding:9px; border:none; border-radius:9px; background:transparent; color:var(--body); font-weight:700; font-size:.9rem; cursor:pointer; }
  .seg button.on{ background:var(--surface); color:var(--lav); box-shadow:var(--shadow); }
  label{ display:block; font-size:.82rem; font-weight:600; margin:12px 0 6px; color:var(--body); }
  input{ width:100%; padding:12px 13px; border:1.5px solid var(--line2); border-radius:11px; font-size:1rem; background:var(--page); color:var(--ink); }
  input:focus{ outline:none; border-color:var(--lav); box-shadow:0 0 0 3px rgba(124,127,224,.2); }
  .gate .go{ width:100%; margin-top:18px; padding:13px; font-size:1rem; border:none; border-radius:11px; background:var(--lav); color:#fff; font-weight:700; cursor:pointer; }
  .gate .err{ color:var(--danger); font-size:.85rem; margin-top:8px; font-weight:600; min-height:1em; }

  .top{ display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
  .top h1{ font-size:1.7rem; color:var(--ink); margin:0; letter-spacing:-.01em; display:flex; align-items:center; gap:9px; }
  .top .date{ color:var(--muted); font-size:.92rem; margin-top:5px; }
  .top .ctrl{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .pill{ display:inline-flex; align-items:center; gap:6px; padding:9px 15px; border-radius:999px; border:1px solid var(--line2);
         background:var(--surface); color:var(--body); font-weight:600; font-size:.88rem; cursor:pointer; text-decoration:none; }
  .pill:hover{ border-color:var(--lav); color:var(--lav); }
  .pill.live{ background:var(--mint-soft); border-color:transparent; color:var(--mint); cursor:default; }
  .dotpulse{ width:8px; height:8px; border-radius:50%; background:var(--mint); animation:pulse 1.6s infinite; }
  @keyframes pulse{ 0%{ box-shadow:0 0 0 0 rgba(63,180,145,.5);} 70%{ box-shadow:0 0 0 7px rgba(63,180,145,0);} 100%{ box-shadow:0 0 0 0 rgba(63,180,145,0);} }
  @media (prefers-reduced-motion: reduce){ .dotpulse{ animation:none; } }

  .kpis{ display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:18px; }
  .kpi{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); padding:16px 18px; box-shadow:var(--shadow); }
  .kpi .ic{ width:34px; height:34px; border-radius:10px; display:grid; place-items:center; font-size:1.05rem; margin-bottom:10px; }
  .kpi .v{ font-size:1.9rem; font-weight:800; color:var(--ink); line-height:1.1; letter-spacing:-.02em; }
  .kpi .l{ font-size:.82rem; color:var(--muted); margin-top:3px; font-weight:600; }
  .kpi.lav .ic{ background:var(--lav-soft); } .kpi.sky .ic{ background:var(--sky-soft); }
  .kpi.mint .ic{ background:var(--mint-soft); } .kpi.peach .ic{ background:var(--peach-soft); }
  .kpi.rose .ic{ background:var(--rose-soft); }

  .board{ display:grid; grid-template-columns:1.5fr 1fr; gap:16px; align-items:start; }
  .col{ display:flex; flex-direction:column; gap:16px; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow); overflow:hidden; }
  .card .ch{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:15px 18px 12px; }
  .card .ch .t{ font-weight:700; color:var(--ink); font-size:1.04rem; display:flex; align-items:center; gap:8px; }
  .card .ch .meta{ font-size:.82rem; color:var(--muted); font-weight:600; }
  .card .cb{ padding:4px 18px 16px; }

  .drow{ display:grid; grid-template-columns:1fr auto; gap:6px 12px; align-items:center; padding:9px 0; border-top:1px solid var(--line); }
  .drow:first-child{ border-top:none; }
  .drow .nm{ font-weight:600; color:var(--ink); font-size:.92rem; display:flex; align-items:center; gap:7px; }
  .ddot{ width:10px; height:10px; border-radius:50%; flex:none; }
  .drow .num{ font-size:.86rem; font-weight:700; color:var(--body); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .drow .num.full{ color:var(--danger); }
  .drow .track{ grid-column:1 / -1; height:7px; background:var(--line2); border-radius:5px; overflow:hidden; }
  .drow .track > i{ display:block; height:100%; border-radius:5px; transition:width .4s; }

  .trow{ display:flex; align-items:center; gap:11px; padding:9px 0; border-top:1px solid var(--line); }
  .trow:first-child{ border-top:none; }
  .rank{ width:24px; height:24px; border-radius:8px; display:grid; place-items:center; font-weight:800; font-size:.82rem; color:#fff; flex:none; background:var(--muted); }
  .rank.r1{ background:#f5b500; } .rank.r2{ background:#aab2c4; } .rank.r3{ background:#d08a5a; }
  .trow .tn{ flex:1; font-weight:600; color:var(--ink); font-size:.92rem; }
  .trow .tv{ font-weight:800; color:var(--lav); font-variant-numeric:tabular-nums; }

  .empty{ color:var(--muted); font-size:.88rem; padding:14px 0; text-align:center; }
  #status{ font-size:.84rem; color:var(--lav); margin:-8px 0 12px; min-height:1em; font-weight:600; }

  @media (max-width:980px){ .board{ grid-template-columns:1fr; } .kpis{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:520px){ .top h1{ font-size:1.4rem; } }
</style>
</head>
<body>
<div class="wrap">
  <!-- 입장 게이트 -->
  <div class="gate" id="gate">
    <h2>신청 현황판</h2>
    <p class="hint">본인 확인 후 현황판을 볼 수 있어요.</p>
    <div class="seg">
      <button id="segStu" class="on">학생</button>
      <button id="segTea">교사</button>
    </div>

    <div id="stuForm">
      <label for="sid">학번 (5자리)</label>
      <input id="sid" inputmode="numeric" maxlength="5" placeholder="예) 10101" />
      <label for="birth">생년월일 6자리</label>
      <input id="birth" inputmode="numeric" maxlength="6" placeholder="예) 100101" />
      <button class="go" id="stuGo" disabled>현황판 보기</button>
    </div>

    <div id="teaForm" style="display:none;">
      <label for="email">이메일</label>
      <input id="email" type="email" placeholder="교사 계정 이메일" />
      <label for="pw">비밀번호</label>
      <input id="pw" type="password" />
      <button class="go" id="teaGo">로그인</button>
    </div>

    <div class="err" id="gateErr"></div>
  </div>

  <!-- 대시보드 -->
  <div id="dash" style="display:none;">
    <div class="top">
      <div>
        <h1 class="display">📊 전공체험 신청 현황판</h1>
        <div class="date">선문대 전공체험 · 2026. 7. 14.(화)</div>
      </div>
      <div class="ctrl">
        <span class="pill live"><span class="dotpulse"></span> 실시간</span>
        <button class="pill" id="refreshBtn">↻ 새로고침</button>
        <a class="pill" id="adminLink" href="admin.html" style="display:none;">📋 명단 관리</a>
        <button class="pill" id="outBtn">나가기</button>
      </div>
    </div>

    <div id="status"></div>
    <div class="kpis" id="kpis"></div>

    <div class="board">
      <div class="col">
        <div class="card">
          <div class="ch"><span class="t">📋 학과별 신청 현황</span><span class="meta" id="deptMeta"></span></div>
          <div class="cb" id="deptList"></div>
        </div>
      </div>
      <div class="col">
        <div class="card">
          <div class="ch"><span class="t">🏆 인기 학과 TOP 5</span></div>
          <div class="cb" id="topList"></div>
        </div>
        <div class="card">
          <div class="ch"><span class="t">💡 신청 팁</span></div>
          <div class="cb" style="padding-bottom:16px; font-size:.9rem; color:var(--body); line-height:1.65;">
            마감된 학과는 신청할 수 없어요. 남은 자리가 많은 학과를 노리면 원하는 곳에 더 쉽게 갈 수 있어요. 신청 후에도 자리가 남아 있으면 다른 학과로 바꿀 수 있습니다.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously, signInWithEmailAndPassword, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, initializeFirestore, collection, doc, getDoc, query, orderBy, onSnapshot, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBHlhwEiE8PyX4Voy1xsS3PZkSMIZ1nos0",
  authDomain: "project-8873314123491726167.firebaseapp.com",
  projectId: "project-8873314123491726167",
  storageBucket: "project-8873314123491726167.firebasestorage.app",
  messagingSenderId: "651427691407",
  appId: "1:651427691407:web:2c7530ff9b8035428469fa",
  measurementId: "G-FTNE1QRPN7",
};
const TEACHER_EMAIL = "hn9193@gmail.com";
const DCOLORS = ["#e8643c","#3b7dd8","#2fa37a","#b65fd1","#cf9b00","#d8527c","#1fa3a0",
                 "#6a78e0","#d8453f","#5aa02c","#c2792e","#8a64d6","#4a8db5"];
const colorOf=(ord)=>DCOLORS[((ord||1)-1)%DCOLORS.length];

const app = initializeApp(firebaseConfig);
let db; try{ db=initializeFirestore(app,{experimentalAutoDetectLongPolling:true}); }catch(e){ db=getFirestore(app); }
const auth = getAuth(app);
setPersistence(auth, browserLocalPersistence).catch(()=>{});
const $=(id)=>document.getElementById(id);

let depts=[], seats=[], students=[], isTeacher=false, entered=false, unsub=[], pollTimer=null;
const esc=(s)=>String(s).replace(/[&<>]/g,(c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));

async function sha256Hex(str){ const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join(""); }
const normBirth=(s)=>String(s).replace(/\D/g,"").padStart(6,"0").slice(-6);
const vhashOf=(sid,birth)=>sha256Hex(`${String(sid).trim()}|${normBirth(birth)}`);

// 탭 전환
$("segStu").addEventListener("click", ()=>{ $("segStu").classList.add("on"); $("segTea").classList.remove("on");
  $("stuForm").style.display="block"; $("teaForm").style.display="none"; $("gateErr").textContent=""; });
$("segTea").addEventListener("click", ()=>{ $("segTea").classList.add("on"); $("segStu").classList.remove("on");
  $("teaForm").style.display="block"; $("stuForm").style.display="none"; $("gateErr").textContent=""; });

// 익명 로그인(학생 경로 + departments 읽기용)
signInAnonymously(auth).then(()=>{ $("stuGo").disabled=false; }).catch(e=>console.error(e));

// 교사 로그인 상태 감지 (이미 admin에 로그인돼 있으면 자동 교사 모드)
onAuthStateChanged(auth,(user)=>{
  isTeacher = !!(user && !user.isAnonymous && user.email===TEACHER_EMAIL);
  if(isTeacher){ enter(true); }
});

// 학생 본인 확인
$("stuGo").addEventListener("click", async ()=>{
  $("gateErr").textContent="";
  const sid=$("sid").value.trim(), birth=$("birth").value.trim();
  if(!/^\d{5}$/.test(sid)) return $("gateErr").textContent="학번은 5자리 숫자로 입력해 주세요.";
  if(!/^\d{6}$/.test(birth)) return $("gateErr").textContent="생년월일은 6자리 숫자로 입력해 주세요.";
  $("stuGo").disabled=true; $("stuGo").textContent="확인 중…";
  try{
    const vh=await vhashOf(sid,birth);
    const snap=await getDoc(doc(db,"students",vh));
    if(!snap.exists()){ $("gateErr").textContent="학번 또는 생년월일이 일치하지 않습니다."; return; }
    enter(false);
  }catch(e){ console.error(e); $("gateErr").textContent="확인 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요."; }
  finally{ $("stuGo").disabled=false; $("stuGo").textContent="현황판 보기"; }
});

// 교사 로그인
$("teaGo").addEventListener("click", async ()=>{
  $("gateErr").textContent="";
  try{ await signInWithEmailAndPassword(auth,$("email").value.trim(),$("pw").value); /* onAuthStateChanged가 enter 처리 */ }
  catch(e){ $("gateErr").textContent="로그인 실패: 이메일/비밀번호를 확인해 주세요."; }
});

$("outBtn").addEventListener("click", ()=>{
  if(isTeacher){ signOut(auth).then(()=>signInAnonymously(auth)); }
  entered=false; isTeacher=false;
  unsub.forEach(fn=>fn()); unsub=[]; if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
  $("dash").style.display="none"; $("gate").style.display="block";
});
$("refreshBtn").addEventListener("click", ()=>pollOnce(true));

function enter(teacher){
  isTeacher=teacher; entered=true;
  $("adminLink").style.display = teacher? "inline-flex":"none";
  $("gate").style.display="none"; $("dash").style.display="block";
  startListening();
}

function startListening(){
  if(unsub.length) return;
  unsub.push(onSnapshot(query(collection(db,"departments"),orderBy("ord")), s=>{ depts=s.docs.map(d=>({id:d.id,...d.data()})); render(); }, e=>console.error(e)));
  if(isTeacher){
    unsub.push(onSnapshot(collection(db,"seats"), s=>{ seats=s.docs.map(d=>({vhash:d.id,...d.data()})); render(); }, e=>console.error(e)));
    unsub.push(onSnapshot(collection(db,"students"), s=>{ students=s.docs.map(d=>({vhash:d.id,...d.data()})); render(); }, e=>console.error(e)));
  }
  if(!pollTimer) pollTimer=setInterval(()=>pollOnce(false), 6000);
}

async function pollOnce(show){
  if(show) $("status").textContent="새로고침 중…";
  try{
    const tasks=[ getDocs(query(collection(db,"departments"),orderBy("ord"))) ];
    if(isTeacher){ tasks.push(getDocs(collection(db,"seats"))); tasks.push(getDocs(collection(db,"students"))); }
    const res=await Promise.all(tasks);
    depts=res[0].docs.map(d=>({id:d.id,...d.data()}));
    if(isTeacher){ seats=res[1].docs.map(d=>({vhash:d.id,...d.data()})); students=res[2].docs.map(d=>({vhash:d.id,...d.data()})); }
    render();
    if(show){ $("status").textContent="최신 상태로 새로고침했어요."; setTimeout(()=>$("status").textContent="",1500); }
  }catch(e){ if(show) $("status").textContent="새로고침 중 오류가 발생했습니다."; }
}

function render(){ try{ _render(); }catch(e){ console.error("render error",e); } }
function _render(){
  if(!entered) return;
  const totalCap=depts.reduce((s,d)=>s+(d.capacity||0),0);
  const filled=depts.reduce((s,d)=>s+(d.filled||0),0);  // 공개 데이터(학과 filled 합)
  const remain=depts.reduce((s,d)=>s+Math.max(0,(d.capacity||0)-(d.filled||0)),0);
  const closed=depts.filter(d=>d.filled>=d.capacity).length;

  // KPI: 학생 공통(신청 완료/남은 자리/마감) + 교사 전용(미신청/신청률)
  let kpi = `
    <div class="kpi lav"><div class="ic">🙋</div><div class="v">${filled}</div><div class="l">신청 완료</div></div>
    <div class="kpi mint"><div class="ic">💺</div><div class="v">${remain}</div><div class="l">남은 자리</div></div>
    <div class="kpi rose"><div class="ic">🚩</div><div class="v">${closed}<span style="font-size:1rem"> / ${depts.length}</span></div><div class="l">마감 학과</div></div>`;
  if(isTeacher){
    const stuN=students.length, notApplied=Math.max(0,stuN-filled), rate=stuN?Math.round(filled/stuN*100):0;
    kpi = `<div class="kpi lav"><div class="ic">🙋</div><div class="v">${filled}</div><div class="l">신청 완료</div></div>
    <div class="kpi peach"><div class="ic">⏳</div><div class="v">${notApplied}</div><div class="l">미신청</div></div>
    <div class="kpi sky"><div class="ic">📈</div><div class="v">${rate}<span style="font-size:1rem">%</span></div><div class="l">신청률</div></div>
    <div class="kpi mint"><div class="ic">💺</div><div class="v">${remain}</div><div class="l">남은 자리</div></div>
    <div class="kpi rose"><div class="ic">🚩</div><div class="v">${closed}<span style="font-size:1rem"> / ${depts.length}</span></div><div class="l">마감 학과</div></div>`;
    $("kpis").style.gridTemplateColumns="repeat(5,1fr)";
  } else {
    $("kpis").style.gridTemplateColumns="repeat(3,1fr)";
  }
  $("kpis").innerHTML = kpi;

  // 학과별 현황 (공개 데이터)
  $("deptMeta").textContent = `총 ${filled} / ${totalCap}석`;
  $("deptList").innerHTML = depts.length ? depts.map(d=>{
    const pct=d.capacity?Math.round(d.filled/d.capacity*100):0; const full=d.filled>=d.capacity;
    return `<div class="drow">
      <div class="nm"><span class="ddot" style="background:${colorOf(d.ord)}"></span>${esc(d.name)}</div>
      <div class="num ${full?"full":""}">${full?"마감 · ":""}${d.filled}/${d.capacity}</div>
      <div class="track"><i style="width:${pct}%;background:${colorOf(d.ord)}"></i></div>
    </div>`;
  }).join("") : `<div class="empty">학과 데이터를 불러오는 중…</div>`;

  // 인기 TOP5
  const top=[...depts].sort((a,b)=>b.filled-a.filled).slice(0,5);
  $("topList").innerHTML = (top.length && top[0].filled>0) ? top.map((d,i)=>`
    <div class="trow"><span class="rank r${i+1}">${i+1}</span>
      <span class="tn">${esc(d.name)}</span><span class="tv">${d.filled}명</span></div>`).join("")
    : `<div class="empty">아직 신청 내역이 없어요.</div>`;
}
</script>
</body>
</html>
